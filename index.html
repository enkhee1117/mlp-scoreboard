<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MLP Scoreboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: #141414;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
    }
    .nav button {
      flex: 1; padding: 14px 4px;
      background: none; border: none; border-bottom: 3px solid transparent;
      color: #666; font-size: 13px; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.8px;
      transition: color 0.15s;
    }
    .nav button.active { color: #fff; border-bottom-color: #fff; }

    /* ── ROUND HEADER ── */
    .round-header {
      padding: 20px 16px 6px;
      font-size: 11px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .round-header .round-cheer {
      display: block;
      margin-top: 4px;
      font-size: 11px; font-weight: 700;
      text-transform: none; letter-spacing: 0.3px;
      color: #60a5fa;
    }
    .round-header.penultimate { color: #9ca3af; }
    .round-header.penultimate .round-cheer { color: #fbbf24; }
    .round-header.final { color: #fbbf24; font-size: 13px; }
    .round-header.final .round-cheer { color: #f97316; font-size: 12px; }

    /* ── MATCH CARD ── */
    .match-card {
      background: #1a1a1a;
      border-radius: 16px;
      margin: 8px 12px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
    }
    .match-top {
      background: #1f1f1f;
      padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .match-label { font-size: 11px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
    .badge {
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-upcoming { background: #1e3a5f; color: #60a5fa; }
    .badge-live { background: #5f1e1e; color: #f87171; animation: pulse 2s infinite; }
    .badge-done { background: #1a2a1a; color: #4ade80; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    /* ── TEAMS SCORE BAR ── */
    .teams-bar {
      display: grid; grid-template-columns: 1fr 48px 1fr;
      align-items: center; padding: 16px 14px 12px; gap: 8px;
    }
    .team-side { }
    .team-side.right { text-align: right; }
    .team-name-sm { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .games-won { font-size: 40px; font-weight: 900; line-height: 1; }
    .match-pts-label { font-size: 11px; color: #555; margin-top: 2px; }
    .vs-circle {
      text-align: center; color: #444; font-size: 13px; font-weight: 700;
    }

    /* ── GAME ROW ── */
    .game-section {
      border-top: 1px solid #252525;
      padding: 12px 14px;
    }
    .game-section.complete { background: #161616; }
    .game-title-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .game-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.8px; }
    .game-done-label { font-size: 11px; font-weight: 700; }
    .players-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 6px; margin-bottom: 10px;
    }
    .player-names { font-size: 11px; color: #777; }
    .player-names.right { text-align: right; }
    .vs-tiny { font-size: 10px; color: #444; text-align: center; }

    /* ── SCORE CONTROLS ── */
    .score-row {
      display: grid; grid-template-columns: 1fr 32px 1fr;
      align-items: center; gap: 6px;
    }
    .score-side {
      display: flex; align-items: center; gap: 0;
      background: #252525; border-radius: 12px; overflow: hidden;
    }
    .score-side.right { flex-direction: row-reverse; }
    button, input[type="number"] { touch-action: manipulation; }
    .score-tap {
      flex: 0 0 44px; height: 52px;
      background: none; border: none; color: #fff;
      font-size: 26px; font-weight: 300; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .score-tap:active { background: #3a3a3a; }
    .score-tap.minus { font-size: 20px; color: #555; }
    .score-num-big {
      flex: 1; text-align: center;
      font-size: 32px; font-weight: 900; line-height: 52px;
      min-width: 0;
    }
    /* When the big score is an editable input */
    input.score-num-big {
      background: transparent; border: none; outline: none;
      color: #fff; padding: 0; margin: 0;
      -moz-appearance: textfield; appearance: textfield;
      font-family: inherit; width: 100%; height: 52px;
    }
    input.score-num-big::-webkit-outer-spin-button,
    input.score-num-big::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    input.score-num-big:focus { background: rgba(255,255,255,0.04); }
    .score-sep { text-align: center; color: #444; font-size: 14px; font-weight: 600; }

    /* ── DONE BUTTON ── */
    .done-btn {
      width: 100%; margin-top: 10px; padding: 11px;
      background: #252525; border: none; border-radius: 10px;
      color: #aaa; font-size: 13px; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.5px;
      transition: background 0.1s;
    }
    .done-btn:active { background: #333; }

    .undo-btn {
      margin-top: 6px; padding: 5px 10px;
      background: transparent; border: 1px solid #2a2a2a;
      border-radius: 6px; color: #555; font-size: 11px; cursor: pointer;
    }

    .reset-row { padding: 8px 14px 12px; text-align: right; }
    .reset-btn {
      padding: 5px 12px; background: transparent;
      border: 1px solid #2a2a2a; border-radius: 6px;
      color: #444; font-size: 11px; cursor: pointer;
    }

    /* ── MATCH RESULT BANNER ── */
    .result-banner {
      padding: 12px 14px; text-align: center;
      font-size: 14px; font-weight: 700;
    }

    /* ── STANDINGS ── */
    .standings-page { padding-bottom: 40px; }
    .standings-header { padding: 20px 16px 8px; }
    .standings-header h1 { font-size: 22px; font-weight: 800; }
    .standings-header p { color: #666; font-size: 13px; margin-top: 4px; }

    .card {
      background: #1a1a1a; border-radius: 14px;
      margin: 8px 12px; overflow: hidden;
      border: 1px solid #2a2a2a;
    }
    .card-label {
      padding: 10px 14px 4px;
      font-size: 10px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: 1.5px;
    }

    .standings-row {
      display: grid;
      grid-template-columns: 24px 1fr 42px 54px 46px 52px 32px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid #252525;
      gap: 4px;
    }
    .standings-row.header-row {
      padding: 8px 14px;
      border-top: none;
    }
    .standings-row.header-row span {
      font-size: 10px; color: #555; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .edit-team-btn {
      width: 28px; height: 28px; border-radius: 8px;
      background: #252525; border: none; color: #666;
      font-size: 14px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .edit-team-btn:active { background: #333; }
    .standings-rank { font-size: 13px; color: #555; font-weight: 700; }
    .standings-team { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .standings-pts { font-size: 18px; font-weight: 900; text-align: center; }
    .standings-games { font-size: 12px; text-align: center; color: #999; }
    .standings-diff { font-size: 12px; text-align: center; color: #999; }
    .finals-badge {
      font-size: 10px; font-weight: 700; padding: 3px 7px;
      border-radius: 20px; text-align: center;
    }
    .finals-in { background: #14532d; color: #4ade80; }
    .bronze-in { background: #3a2000; color: #cd7f32; }
    .finals-out { background: transparent; color: #444; }

    .info-card { padding: 14px 16px; font-size: 13px; line-height: 2; color: #aaa; }
    .info-card strong { color: #fff; }

    .schedule-match { margin-bottom: 4px; }

    /* ── CHAMPIONSHIP ── */
    .champ-section { margin-top: 4px; }
    .champ-note { color: #facc15; font-size: 12px; margin-top: 4px; }

    /* ── PAGE BOTTOM PAD ── */
    .page-pad { height: 40px; }

    /* ── ACTIVE MATCH ── */
    .match-card.match-live {
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 8px 32px rgba(0,0,0,0.5);
    }
    .match-card.match-live .match-top { background: #282828; }

    /* ── SCORE EDIT SHEET ── */
    .score-edit-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 400; display: flex; align-items: flex-end; justify-content: center;
    }
    .score-edit-sheet {
      background: #1e1e1e; border-radius: 22px 22px 0 0;
      width: 100%; max-width: 400px; padding: 20px 24px 44px;
      border-top: 1px solid #333;
    }
    .score-edit-handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin: 0 auto 18px; }
    .score-edit-label { font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 10px; }
    .score-edit-input {
      width: 100%; text-align: center; font-size: 52px; font-weight: 900;
      background: #141414; border: 2px solid #333; border-radius: 14px;
      color: #fff; padding: 10px; outline: none; margin-bottom: 14px;
    }
    .score-edit-input:focus { border-color: #555; }
    .score-edit-btns { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
    .score-edit-cancel { padding: 14px; background: #2a2a2a; border: none; border-radius: 12px; color: #888; font-size: 15px; font-weight: 700; cursor: pointer; }
    .score-edit-confirm { padding: 14px; background: #fff; border: none; border-radius: 12px; color: #000; font-size: 15px; font-weight: 700; cursor: pointer; }

    /* ── RULES BUTTON ── */
    .rules-fab {
      position: fixed; bottom: 24px; right: 20px; z-index: 200;
      width: 48px; height: 48px; border-radius: 50%;
      background: #fff; color: #000;
      border: none; font-size: 22px; font-weight: 900;
      cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .rules-fab:active { transform: scale(0.92); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .rules-fab::before {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.7);
      pointer-events: none; opacity: 0;
    }
    .rules-fab.pulse::before { animation: rules-pulse 1.8s ease-out infinite; }
    .rules-fab.pulse { animation: rules-wobble 1.8s ease-in-out infinite; }
    @keyframes rules-pulse {
      0%   { transform: scale(1);   opacity: 0.9; }
      70%  { transform: scale(1.6); opacity: 0; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    @keyframes rules-wobble {
      0%, 80%, 100% { transform: scale(1); }
      85%           { transform: scale(1.08) rotate(-4deg); }
      92%           { transform: scale(1.08) rotate(4deg); }
    }

    /* ── RULES MODAL ── */
    .rules-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.88);
      z-index: 300; display: flex; align-items: flex-end;
      justify-content: center; padding: 0;
    }
    .rules-sheet {
      background: #1a1a1a; border-radius: 22px 22px 0 0;
      width: 100%; max-width: 520px;
      max-height: 88vh; overflow-y: auto;
      padding: 20px 20px 40px;
      border-top: 1px solid #2a2a2a;
      position: relative;
    }
    .rules-handle {
      width: 40px; height: 4px; background: #444; border-radius: 2px;
      margin: 0 auto 20px;
    }
    .rules-sheet h2 {
      font-size: 20px; font-weight: 800; margin-bottom: 4px;
    }
    .rules-sheet h3 {
      font-size: 13px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 1px;
      margin: 20px 0 10px;
    }
    .rules-sheet p { font-size: 14px; color: #aaa; line-height: 1.7; margin-bottom: 8px; }
    .rules-sheet strong { color: #fff; }
    .rule-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid #252525;
      font-size: 14px; color: #aaa; line-height: 1.5;
    }
    .rule-row:last-child { border-bottom: none; }
    .rule-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; margin-top: 1px; }
    .pts-grid {
      display: grid; grid-template-columns: auto 1fr;
      gap: 8px 14px; font-size: 14px; padding: 4px 0;
    }
    .pts-val { font-size: 18px; font-weight: 900; color: #fff; text-align: right; }
    .pts-desc { color: #aaa; align-self: center; }
    .rules-close {
      width: 100%; margin-top: 24px; padding: 14px;
      background: #2a2a2a; border: none; border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .lang-picker {
      display: flex; gap: 8px; margin-bottom: 18px;
    }
    .lang-btn {
      flex: 1; padding: 8px 4px; border-radius: 10px;
      border: 1px solid #333; background: #252525;
      color: #888; font-size: 13px; font-weight: 700; cursor: pointer;
      transition: all 0.15s;
    }
    .lang-btn.lang-active {
      background: #fff; color: #000; border-color: #fff;
    }

    /* ── SYNC ── */
    .sync-bar {
      background: #141414; border-bottom: 1px solid #2a2a2a;
      padding: 8px 14px; display: flex; align-items: center; justify-content: space-between;
      font-size: 12px;
    }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; flex-shrink:0; }
    .sync-connected .sync-dot { background: #4ade80; }
    .sync-disconnected .sync-dot { background: #ef4444; }
    .sync-pending .sync-dot { background: #facc15; animation: pulse 1s infinite; }
    .sync-label { color: #888; }
    .sync-connected .sync-label { color: #4ade80; }
    .sync-setup-btn {
      font-size: 11px; padding: 4px 10px; background: #2a2a2a;
      border: none; border-radius: 6px; color: #aaa; cursor: pointer; font-weight: 600;
    }

    /* ── SETUP OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; padding: 20px;
    }
    .overlay-card {
      background: #1a1a1a; border-radius: 18px; padding: 24px;
      width: 100%; max-width: 420px; border: 1px solid #333;
    }
    .overlay-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .overlay-card p { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 14px; }
    .overlay-card ol { font-size: 13px; color: #aaa; line-height: 2; padding-left: 18px; margin-bottom: 16px; }
    .overlay-card ol strong { color: #fff; }
    .overlay-input {
      width: 100%; padding: 12px; background: #0d0d0d; border: 1px solid #333;
      border-radius: 10px; color: #fff; font-size: 13px; margin-bottom: 10px;
      outline: none;
    }
    .overlay-input:focus { border-color: #555; }
    .overlay-btns { display: flex; gap: 8px; }
    .overlay-btn-primary {
      flex: 1; padding: 12px; background: #fff; color: #000;
      border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .overlay-btn-skip {
      padding: 12px 16px; background: #2a2a2a; color: #888;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
    }

    /* ── TOURNAMENT STYLE PICKER ── */
    .style-bar {
      display: flex; padding: 0; gap: 6px;
    }
    .style-btn {
      flex: 1; padding: 9px 6px;
      background: #151515; border: 1px solid #262626; border-radius: 10px;
      color: #888; font-size: 11px; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.6px;
      transition: all 0.15s;
    }
    .style-btn.active { background: #fff; color: #000; border-color: #fff; }
    .style-btn.disabled { color: #444; cursor: not-allowed; }

    /* ── ROUND ROBIN STYLES ── */
    .rr-page { padding-bottom: 40px; }
    .rr-header { padding: 18px 16px 4px; }
    .rr-header h1 { font-size: 22px; font-weight: 800; }
    .rr-header p { color: #666; font-size: 13px; margin-top: 4px; }
    .rr-subsection-label {
      padding: 16px 16px 6px;
      font-size: 11px; font-weight: 700; color: #555;
      text-transform: uppercase; letter-spacing: 1.5px;
    }

    .rr-player-input {
      width: 100%; padding: 10px 12px;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 9px; color: #fff; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    .rr-player-input:focus { border-color: #555; }
    .rr-player-row {
      display: grid; grid-template-columns: 26px 1fr;
      gap: 8px; align-items: center; margin-bottom: 6px;
    }
    .rr-player-num {
      font-size: 11px; color: #555; font-weight: 700; text-align: right;
    }

    .rr-config-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding: 0 4px;
    }
    .rr-config-item {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 10px 12px;
    }
    .rr-config-label {
      font-size: 10px; color: #666; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
    }
    .rr-config-input {
      width: 100%; background: transparent; border: none;
      color: #fff; font-size: 18px; font-weight: 800;
      outline: none; padding: 0;
    }

    .rr-round-card {
      background: #1a1a1a; border-radius: 14px;
      margin: 8px 12px; overflow: hidden; border: 1px solid #2a2a2a;
    }
    .rr-round-top {
      background: #1f1f1f; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .rr-round-title { font-size: 13px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 0.6px; }
    .rr-court-pill {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 3px 9px; border-radius: 7px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.4px;
      border: 1px solid; white-space: nowrap;
    }

    .rr-game-card {
      padding: 12px 14px;
      border-top: 1px solid #252525;
    }
    .rr-game-card.complete { background: #161616; }
    .rr-game-label-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .rr-game-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.8px; }
    .rr-team-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 8px; align-items: center; margin-bottom: 10px;
    }
    .rr-team-names {
      font-size: 12px; color: #ccc; font-weight: 700; line-height: 1.4;
    }
    .rr-team-names.right { text-align: right; }
    .rr-team-names.t1 { color: #60a5fa; }
    .rr-team-names.t2 { color: #f472b6; }
    .rr-vs { font-size: 10px; color: #444; text-align: center; }

    .rr-player-pill {
      display: inline-block; padding: 2px 6px;
      background: #252525; border-radius: 6px;
      font-size: 11px; color: #ccc; margin: 1px;
    }

    .rr-generate-btn {
      width: calc(100% - 24px); margin: 10px 12px;
      padding: 14px; background: #fff; color: #000;
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 800; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .rr-generate-btn:active { transform: scale(0.98); }
    .rr-generate-btn.secondary { background: #2a2a2a; color: #ccc; }
    .rr-generate-btn.warn { background: #2a1a1a; color: #f87171; border: 1px solid #5a1a1a; }

    .rr-standings-row {
      display: grid;
      grid-template-columns: 28px 1fr 44px 54px 48px 48px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid #252525;
      gap: 4px;
    }
    .rr-standings-row.header-row { padding: 8px 14px; border-top: none; }
    .rr-standings-row.header-row span {
      font-size: 10px; color: #555; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .rr-rank-badge {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; background: #252525; color: #888;
    }

<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════
const DEFAULT_TEAMS = {
  red:   { name: 'Team Red',   color: '#ef4444', males: ['Thai','Enrique'],    females: ['Shilan','Sandy']    },
  blue:  { name: 'Team Blue',  color: '#60a5fa', males: ['Ed','Michael Lee'],  females: ['Manal','Joomi']     },
  green: { name: 'Team Green', color: '#4ade80', males: ['Enke','Andrew'],     females: ['Jenny','Young']     },
  gold:  { name: 'Team Gold',  color: '#facc15', males: ['Paul','Alix'],       females: ['Terry','Elina']     },
};

// Always read teams from state so edits persist & sync
function T(key) { return (state && state.teams && state.teams[key]) || DEFAULT_TEAMS[key]; }

// Court name lookup — court numbers are 1-based strings
function courtName(num) {
  const idx = parseInt(num) - 1;
  return (state && state.courts && state.courts[idx]) || ('Court ' + num);
}

const SCHEDULE = [
  { id:0, round:1, court:'1', t1:'red',  t2:'blue'  },
  { id:1, round:1, court:'2', t1:'green',t2:'gold'  },
  { id:2, round:2, court:'1', t1:'red',  t2:'green' },
  { id:3, round:2, court:'3', t1:'blue', t2:'gold'  },
  { id:4, round:3, court:'2', t1:'red',  t2:'gold'  },
  { id:5, round:3, court:'3', t1:'blue', t2:'green' },
];

const GAME_LABELS = ["Women's Doubles","Men's Doubles","Mixed Doubles 1","Mixed Doubles 2","Dreambreaker"];

// mixedOpt: { t1: 0|1, t2: 0|1 }
// opt=0: Mixed1=(F0+M0, F1+M1)  opt=1: Mixed1=(F1+M0, F0+M1)  — females swap
function gamePlayers(def, gi, mixedOpt) {
  const t1 = T(def.t1), t2 = T(def.t2);
  if (gi===0) return { p1: t1.females.join(' & '), p2: t2.females.join(' & ') };
  if (gi===1) return { p1: t1.males.join(' & '),   p2: t2.males.join(' & ')   };
  const o1 = (mixedOpt && mixedOpt.t1) || 0;
  const o2 = (mixedOpt && mixedOpt.t2) || 0;
  if (gi===2) return {
    p1: `${t1.females[o1===0?0:1]} & ${t1.males[0]}`,
    p2: `${t2.females[o2===0?0:1]} & ${t2.males[0]}`,
  };
  if (gi===3) return {
    p1: `${t1.females[o1===0?1:0]} & ${t1.males[1]}`,
    p2: `${t2.females[o2===0?1:0]} & ${t2.males[1]}`,
  };
  return { p1: t1.name, p2: t2.name };
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
function blankGame() { return { s1:0, s2:0, done:false, winner:null }; }
function blankMatch(id) {
  return { id, games:[0,1,2,3].map(()=>blankGame()), db:blankGame(), needsDB:false, done:false, winner:null, mixedOpt:{t1:0,t2:0} };
}

function defaultState() {
  return { matches:SCHEDULE.map(m=>blankMatch(m.id)), champMatch:null, bronzeMatch:null, teams: JSON.parse(JSON.stringify(DEFAULT_TEAMS)), courts:['Court 1','Court 2','Court 3'] };
}

function loadState() {
  try { const s=localStorage.getItem('mlp_v3'); if(s) return JSON.parse(s); } catch(e){}
  return defaultState();
}

// ═══════════════════════════════════════════════
//  FIREBASE SYNC
// ═══════════════════════════════════════════════
const HARDCODED_FIREBASE_URL = 'https://mlp-scoreboard-default-rtdb.firebaseio.com';
let FIREBASE_URL = HARDCODED_FIREBASE_URL || localStorage.getItem('mlp_firebase_url') || '';
let syncStatus = FIREBASE_URL ? 'pending' : 'off'; // 'off'|'pending'|'ok'|'error'
let syncSource = null;
let saveTimer = null;
let localWrite = false;
let currentView = localStorage.getItem('mlp_view') || 'matches';
let tournamentMode = localStorage.getItem('tournament_mode') || 'mlp';

function save() {
  localStorage.setItem('mlp_v3', JSON.stringify(state));
  if (!FIREBASE_URL) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    localWrite = true;
    fetch(FIREBASE_URL + '/mlp_state.json', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(state)
    }).catch(()=>{ localWrite = false; syncStatus='error'; renderSyncBar(); });
  }, 150); // debounce rapid taps
}

function initSync() {
  if (syncSource) { syncSource.close(); syncSource = null; }
  if (!FIREBASE_URL) { syncStatus='off'; renderSyncBar(); return; }
  syncStatus = 'pending'; renderSyncBar();
  syncSource = new EventSource(FIREBASE_URL + '/mlp_state.json');
  syncSource.addEventListener('put', e => {
    try {
      const payload = JSON.parse(e.data);
      if (payload.data) {
        if (localWrite) {
          // This is our own write echoed back — skip re-render to preserve input focus
          localWrite = false;
          syncStatus = 'ok'; renderSyncBar();
          return;
        }
        state = payload.data;
        // Migrate: ensure teams and courts always present
        if (!state.teams) state.teams = JSON.parse(JSON.stringify(DEFAULT_TEAMS));
        if (!state.courts) state.courts = ['Court 1','Court 2','Court 3'];
        localStorage.setItem('mlp_v3', JSON.stringify(state));
        syncStatus = 'ok'; render();
      } else if (payload.path === '/' && payload.data === null) {
        // DB is empty — push our local state up
        save();
        syncStatus = 'ok'; renderSyncBar();
      }
    } catch(_) {}
  });
  syncSource.onerror = () => { syncStatus='error'; renderSyncBar(); };
}

function connectFirebase() {
  const input = document.getElementById('fb-url-input');
  const url = (input ? input.value : '').trim().replace(/\/$/, '');
  if (!url.startsWith('https://')) { alert('Enter a valid Firebase database URL (starts with https://)'); return; }
  FIREBASE_URL = url;
  localStorage.setItem('mlp_firebase_url', FIREBASE_URL);
  document.getElementById('sync-overlay').remove();
  initSync();
}

function disconnectFirebase() {
  FIREBASE_URL = ''; localStorage.removeItem('mlp_firebase_url');
  initSync();
}

function showSetupOverlay() {
  const existing = document.getElementById('sync-overlay');
  if (existing) { existing.remove(); return; }
  const el = document.createElement('div');
  el.className = 'overlay'; el.id = 'sync-overlay';
  el.innerHTML = `
    <div class="overlay-card">
      <h2>🔄 Live Sync Setup</h2>
      <p>Connect a free Firebase Realtime Database so everyone sees scores update in real time.</p>
      <ol>
        <li>Go to <strong>console.firebase.google.com</strong></li>
        <li>Create a project → <strong>Build → Realtime Database</strong></li>
        <li>Click <strong>Create Database</strong> → choose <strong>Test mode</strong></li>
        <li>Copy the database URL<br><span style="color:#666;font-size:11px">(looks like https://your-project-default-rtdb.firebaseio.com)</span></li>
      </ol>
      <input class="overlay-input" id="fb-url-input" type="url"
        placeholder="https://your-project-default-rtdb.firebaseio.com"
        value="${FIREBASE_URL}" />
      <div class="overlay-btns">
        <button class="overlay-btn-primary" onclick="connectFirebase()">Connect</button>
        <button class="overlay-btn-skip" onclick="document.getElementById('sync-overlay').remove()">Skip</button>
      </div>
      ${FIREBASE_URL ? `<div style="margin-top:10px;text-align:center"><button onclick="disconnectFirebase();document.getElementById('sync-overlay').remove()" style="background:none;border:none;color:#ef4444;font-size:12px;cursor:pointer">Disconnect &amp; use local only</button></div>` : ''}
    </div>
  `;
  document.body.appendChild(el);
}

function renderSyncBar() {
  const bar = document.getElementById('sync-status-bar');
  if (!bar) return;
  const cls = syncStatus==='ok'?'sync-connected':syncStatus==='error'?'sync-disconnected':'sync-pending';
  const label = syncStatus==='ok'?'Live sync on':syncStatus==='error'?'Sync error':syncStatus==='off'?'Local only':'Connecting…';
  bar.className = 'sync-bar ' + cls;
  bar.innerHTML = `<span><span class="sync-dot"></span><span class="sync-label">${label}</span></span>`;
}

let state = loadState();

// ═══════════════════════════════════════════════
//  LOGIC
// ═══════════════════════════════════════════════
function gamesWon(match) {
  let t1=0,t2=0;
  match.games.forEach(g=>{ if(g.done){ g.winner==='t1'?t1++:t2++; }});
  // Count dreambreaker as a game so score shows 3-2, not 2-2
  if (match.db.done) { match.db.winner==='t1'?t1++:t2++; }
  return {t1,t2};
}

function matchPoints(match) {
  if (!match.done) return {t1:0,t2:0};
  if (match.needsDB) {
    return match.winner==='t1' ? {t1:2,t2:1} : {t1:1,t2:2};
  }
  return match.winner==='t1' ? {t1:3,t2:0} : {t1:0,t2:3};
}

function standings() {
  const s = {};
  Object.keys(DEFAULT_TEAMS).forEach(k=>{s[k]={mp:0,gw:0,gp:0,pf:0,pa:0};});

  SCHEDULE.forEach((def,i)=>{
    const m = state.matches[i];
    if (!m.done) return;
    const pts = matchPoints(m);
    s[def.t1].mp += pts.t1;
    s[def.t2].mp += pts.t2;
    m.games.forEach(g=>{
      if (!g.done) return;
      s[def.t1].gw += g.winner==='t1'?1:0;
      s[def.t2].gw += g.winner==='t2'?1:0;
      s[def.t1].gp++; s[def.t2].gp++;
      s[def.t1].pf+=g.s1; s[def.t1].pa+=g.s2;
      s[def.t2].pf+=g.s2; s[def.t2].pa+=g.s1;
    });
    if (m.db.done) {
      s[def.t1].pf+=m.db.s1; s[def.t1].pa+=m.db.s2;
      s[def.t2].pf+=m.db.s2; s[def.t2].pa+=m.db.s1;
    }
  });

  // Championship match
  if (state.champMatch && state.champMatch.done) {
    const cm = state.champMatch;
    const def = {t1: cm.t1key, t2: cm.t2key};
    const pts = matchPoints(cm);
    s[def.t1].mp += pts.t1; s[def.t2].mp += pts.t2;
    cm.games.forEach(g=>{
      if (!g.done) return;
      s[def.t1].gw += g.winner==='t1'?1:0;
      s[def.t2].gw += g.winner==='t2'?1:0;
      s[def.t1].gp++; s[def.t2].gp++;
      s[def.t1].pf+=g.s1; s[def.t1].pa+=g.s2;
      s[def.t2].pf+=g.s2; s[def.t2].pa+=g.s1;
    });
  }

  return Object.keys(DEFAULT_TEAMS).map(k=>({
    key:k,
    ...s[k],
    wpct: s[k].gp>0 ? s[k].gw/s[k].gp : 0,
    diff: s[k].pf - s[k].pa,
  })).sort((a,b)=> b.mp-a.mp || b.wpct-a.wpct || b.diff-a.diff);
}

function rrComplete() {
  return state.matches.every(m=>m.done);
}

function getTop2() {
  const st = standings();
  return [st[0].key, st[1].key];
}

function getBottom2() {
  const st = standings();
  return [st[2].key, st[3].key];
}

// ═══════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════
function getMatch(matchId) {
  if (matchId==='champ') return state.champMatch;
  if (matchId==='bronze') return state.bronzeMatch;
  return state.matches[matchId];
}

function setScoreInline(matchId, gi, team, val) {
  const n = parseInt(val);
  if (isNaN(n) || n < 0) return;
  const m = getMatch(matchId);
  if (!m) return;
  const game = gi===4 ? m.db : m.games[gi];
  if (!game || game.done) return;
  if (team===1) game.s1 = n; else game.s2 = n;
  save(); render();
}

function adj(matchId, gi, team, delta) {
  const m = getMatch(matchId);
  const isDB = gi===4;
  const game = isDB ? m.db : m.games[gi];
  if (game.done) return;
  if (team===1) game.s1 = Math.max(0, game.s1+delta);
  else          game.s2 = Math.max(0, game.s2+delta);
  save(); render();
}

function markDone(matchId, gi) {
  const m = getMatch(matchId);
  const isDB = gi===4;
  const game = isDB ? m.db : m.games[gi];
  if (game.done) return;
  if (game.s1===game.s2) { alert("Scores are tied — can't complete game."); return; }
  game.done = true;
  game.winner = game.s1>game.s2 ? 't1' : 't2';

  if (!isDB) {
    const gw = gamesWon(m);
    if (gw.t1 >= 3 || gw.t2 >= 3) {
      // One team clinched 3 wins — match over, no need for remaining games
      m.done = true;
      m.winner = gw.t1 > gw.t2 ? 't1' : 't2';
      launchConfetti();
    } else if (m.games.every(g=>g.done)) {
      // All 4 played and it's 2-2 — need Dreambreaker
      m.needsDB = true;
    }
  } else {
    m.done = true;
    m.winner = game.winner;
    launchConfetti();
  }

  // Auto-create championship + bronze if RR just completed
  if (matchId!=='champ' && matchId!=='bronze' && rrComplete()) {
    if (!state.champMatch) {
      const [k1,k2] = getTop2();
      state.champMatch = { ...blankMatch('champ'), t1key:k1, t2key:k2 };
    }
    if (!state.bronzeMatch) {
      const [k3,k4] = getBottom2();
      state.bronzeMatch = { ...blankMatch('bronze'), t1key:k3, t2key:k4 };
    }
  }
  save(); render();
}

function undoGame(matchId, gi) {
  const m = getMatch(matchId);
  const isDB = gi===4;
  const game = isDB ? m.db : m.games[gi];
  game.done = false; game.winner = null;
  m.done = false; m.winner = null;
  if (isDB) m.needsDB = true;
  else m.needsDB = false;
  save(); render();
}

function resetAll() {
  if (!confirm('Reset ALL games? This clears every score.')) return;
  state.matches = SCHEDULE.map(m=>blankMatch(m.id));
  state.champMatch = null;
  state.bronzeMatch = null;
  save(); render();
}

function resetMatch(matchId) {
  if (!confirm('Reset this match? All scores for it will be cleared.')) return;
  if (matchId==='champ') state.champMatch = null;
  else if (matchId==='bronze') state.bronzeMatch = null;
  else state.matches[matchId] = blankMatch(matchId);
  save(); render();
}

function toggleMixed(matchId, team) {
  const m = getMatch(matchId);
  if (!m.mixedOpt) m.mixedOpt = {t1:0,t2:0};
  m.mixedOpt[team] = m.mixedOpt[team]===0 ? 1 : 0;
  save(); render();
}

function setView(v) { currentView=v; localStorage.setItem('mlp_view',v); render(); }

// ═══════════════════════════════════════════════
//  COURT MANAGEMENT
// ═══════════════════════════════════════════════
function updateCourt(idx, name) {
  if (!state.courts) state.courts = ['Court 1','Court 2','Court 3'];
  state.courts[idx] = name;
  save();
  // Re-render just the courts editor area without full re-render to keep focus
  const el = document.getElementById('court-name-' + idx);
  if (el) el.style.borderColor = '#4ade80';
  setTimeout(() => { const e = document.getElementById('court-name-' + idx); if(e) e.style.borderColor = ''; }, 800);
  // Sync to firebase but don't re-render (preserves input focus)
}

function addCourt() {
  if (!state.courts) state.courts = ['Court 1','Court 2','Court 3'];
  state.courts.push('Court ' + (state.courts.length + 1));
  save(); render();
}

function removeCourt(idx) {
  if (!state.courts || state.courts.length <= 1) return;
  state.courts.splice(idx, 1);
  save(); render();
}

// ═══════════════════════════════════════════════
//  TEAM EDITOR
// ═══════════════════════════════════════════════
function showTeamEditor(key) {
  const existing = document.getElementById('team-editor-overlay');
  if (existing) existing.remove();
  const t = T(key);
  const el = document.createElement('div');
  el.className = 'overlay'; el.id = 'team-editor-overlay';
  el.innerHTML = `
    <div class="overlay-card">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="width:14px;height:14px;border-radius:50%;background:${t.color};flex-shrink:0;display:inline-block"></span>
        <h2 style="margin:0">Edit ${t.name}</h2>
      </div>
      <div style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Team Name</div>
      <input class="overlay-input" id="te-name" value="${t.name}" placeholder="Team name" />
      <div style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px">Male Players</div>
      <input class="overlay-input" id="te-m0" value="${t.males[0]}" placeholder="Male player 1" style="margin-bottom:6px"/>
      <input class="overlay-input" id="te-m1" value="${t.males[1]}" placeholder="Male player 2" />
      <div style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px">Female Players</div>

      <input class="overlay-input" id="te-f1" value="${t.females[1]}" placeholder="Female player 2" />
      <div class="overlay-btns" style="margin-top:16px">
        <button class="overlay-btn-primary" onclick="saveTeamEdit('${key}')">Save</button>
        <button class="overlay-btn-skip" onclick="document.getElementById('team-editor-overlay').remove()">Cancel</button>
      </div>

  `;

}

function saveTeamEdit(key) {
  if (!state.teams) state.teams = JSON.parse(JSON.stringify(DEFAULT_TEAMS));
  const name  = document.getElementById('te-name').value.trim() || T(key).name;
  const m0    = document.getElementById('te-m0').value.trim()   || T(key).males[0];
  const m1    = document.getElementById('te-m1').value.trim()   || T(key).males[1];
  const f0    = document.getElementById('te-f0').value.trim()   || T(key).females[0];
  const f1    = document.getElementById('te-f1').value.trim()   || T(key).females[1];
  state.teams[key] = { ...state.teams[key], name, males:[m0,m1], females:[f0,f1] };
  document.getElementById('team-editor-overlay').remove();
  save(); render();
}

function tc(key) { return T(key).color; }

function scoreBlock(matchId, gi, s1, s2, done, winner, t1key, t2key) {
  const mid = matchId;
  if (done) {
    // Static display when done
    const w1 = winner==='t1';
    return `
      <div class="score-row">
        <div class="score-side" style="justify-content:center">
          <div class="score-num-big" style="color:${w1?tc(t1key):'#fff'}">${s1}</div>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right" style="justify-content:center">
          <div class="score-num-big" style="color:${!w1?tc(t2key):'#fff'}">${s2}</div>
        </div>
      </div>
      <div style="text-align:center;margin-top:4px">
        <button class="undo-btn" onclick="undoGame('${mid}',${gi})">Undo</button>
      </div>
    `;
  }
  return `
    <div class="score-row">
      <div class="score-side">
        <button class="score-tap" onclick="adj('${mid}',${gi},1,1)" style="color:${tc(t1key)}">+</button>
        <input class="score-num-big" type="number" min="0" value="${s1}"
          data-focus-key="mlp-${mid}-${gi}-1"
          onchange="setScoreInline('${mid}',${gi},1,this.value)"
          onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
          style="color:${tc(t1key)}"/>
        <button class="score-tap minus" onclick="adj('${mid}',${gi},1,-1)">−</button>
      </div>
      <div class="score-sep">–</div>
      <div class="score-side right">
        <button class="score-tap minus" onclick="adj('${mid}',${gi},2,-1)">−</button>
        <input class="score-num-big" type="number" min="0" value="${s2}"
          data-focus-key="mlp-${mid}-${gi}-2"
          onchange="setScoreInline('${mid}',${gi},2,this.value)"
          onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
          style="color:${tc(t2key)}"/>
        <button class="score-tap" onclick="adj('${mid}',${gi},2,1)" style="color:${tc(t2key)}">+</button>
      </div>
    </div>
    <button class="done-btn" onclick="markDone('${mid}',${gi})">Mark Game Done ✓</button>
  `;
}

function renderMixedSwapRow(def, m, matchId) {
  const opt = m.mixedOpt || {t1:0,t2:0};
  const t1 = T(def.t1), t2 = T(def.t2);
  // Show current pairing summary for each team
  const p1a = `${t1.females[opt.t1===0?0:1]} & ${t1.males[0]}`;
  const p1b = `${t1.females[opt.t1===0?1:0]} & ${t1.males[1]}`;
  const p2a = `${t2.females[opt.t2===0?0:1]} & ${t2.males[0]}`;
  const p2b = `${t2.females[opt.t2===0?1:0]} & ${t2.males[1]}`;
  const mixedLocked = m.games[2].done || m.games[3].done;
  const lockNote = mixedLocked ? '<span style="color:#555;font-size:10px">locked after game starts</span>' : '';
  return `
    <div style="border-top:1px solid #252525;padding:10px 14px;background:#131313">
      <div style="font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Mixed Doubles Pairings</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:#1e1e1e;border-radius:10px;padding:8px 10px">
          <div style="font-size:11px;font-weight:700;color:${tc(def.t1)};margin-bottom:4px">${t1.name}</div>
          <div style="font-size:11px;color:#888;margin-bottom:2px">MD1: ${p1a}</div>
          <div style="font-size:11px;color:#888;margin-bottom:6px">MD2: ${p1b}</div>
          ${!mixedLocked?`<button onclick="toggleMixed('${matchId}','t1')" style="width:100%;padding:5px;background:#2a2a2a;border:none;border-radius:7px;color:#ccc;font-size:11px;font-weight:700;cursor:pointer">⇄ Swap</button>`:'<div style="font-size:10px;color:#444;text-align:center">locked</div>'}
        </div>
        <div style="background:#1e1e1e;border-radius:10px;padding:8px 10px">
          <div style="font-size:11px;font-weight:700;color:${tc(def.t2)};margin-bottom:4px">${t2.name}</div>
          <div style="font-size:11px;color:#888;margin-bottom:2px">MD1: ${p2a}</div>
          <div style="font-size:11px;color:#888;margin-bottom:6px">MD2: ${p2b}</div>
          ${!mixedLocked?`<button onclick="toggleMixed('${matchId}','t2')" style="width:100%;padding:5px;background:#2a2a2a;border:none;border-radius:7px;color:#ccc;font-size:11px;font-weight:700;cursor:pointer">⇄ Swap</button>`:'<div style="font-size:10px;color:#444;text-align:center">locked</div>'}
        </div>
      </div>
    </div>
  `;
}

function renderGameSection(def, m, gi, matchId) {
  const isDB = gi===4;
  const game = isDB ? m.db : m.games[gi];
  const label = GAME_LABELS[gi];
  const players = gamePlayers(def, gi, m.mixedOpt);
  const t1 = def.t1, t2 = def.t2;

  let doneLabelHtml = '';
  if (game.done) {
    const winKey = game.winner==='t1'?t1:t2;
    doneLabelHtml = `<span class="game-done-label" style="color:${tc(winKey)}">${T(winKey).name} wins</span>`;
  }

  // Insert swap row just before Mixed Doubles 1
  const swapRow = (gi===2) ? renderMixedSwapRow(def, m, matchId) : '';

  return `
    ${swapRow}
    <div class="game-section${game.done?' complete':''}">
      <div class="game-title-row">
        <span class="game-title">${label}</span>
        ${doneLabelHtml}
      </div>
      <div class="players-row">
        <div class="player-names" style="color:${tc(t1)}">${players.p1}</div>
        <div class="vs-tiny">vs</div>
        <div class="player-names right" style="color:${tc(t2)}">${players.p2}</div>
      </div>
      ${scoreBlock(matchId, gi, game.s1, game.s2, game.done, game.winner, t1, t2)}
    </div>
  `;
}

function renderMatchCard(def, m, matchId) {
  const t1 = T(def.t1), t2 = T(def.t2);
  const gw = gamesWon(m);
  const pts = matchPoints(m);

  // Badge
  let badge, badgeClass;
  if (m.done) { badge='Final'; badgeClass='badge-done'; }
  else if (m.games.some(g=>g.s1>0||g.s2>0||g.done)||m.db.s1>0||m.db.s2>0) { badge='Live'; badgeClass='badge-live'; }
  else { badge='Upcoming'; badgeClass='badge-upcoming'; }

  // Games to render — hide game 4 if match was already won after 3 games
  let gamesHtml = '';
  for (let gi=0;gi<4;gi++) {
    if (gi===3 && m.done && !m.games[3].done) continue; // skipped — early 3-0 win
    gamesHtml += renderGameSection(def, m, gi, matchId);
  }
  if (m.needsDB) {
    gamesHtml += renderGameSection(def, m, 4, matchId);
  }

  // Result banner
  let resultHtml = '';
  if (m.done) {
    const winKey = m.winner==='t1'?def.t1:def.t2;
    const extra = m.needsDB ? ' via Dreambreaker' : '';
    resultHtml = `<div class="result-banner" style="background:#0f2a0f;color:${tc(winKey)}">${T(winKey).name} wins the match${extra}!</div>`;
  }

  const isLive = badgeClass === 'badge-live';
  return `
    <div class="match-card${isLive?' match-live':''}" ${isLive?'id="active-match"':''}>
      <div class="match-top">
        <span class="match-label">${def.round==='Champ'?'Championship':'Round '+def.round} · ${courtName(def.court)}</span>
        <span class="badge ${badgeClass}">${badge}</span>
      </div>
      <div class="teams-bar">
        <div class="team-side">
          <div class="team-name-sm" style="color:${tc(def.t1)}">${t1.name}</div>
          <div class="games-won">${gw.t1}</div>
          ${m.done?`<div class="match-pts-label">${pts.t1} match pts</div>`:''}
        </div>
        <div class="vs-circle">VS</div>
        <div class="team-side right">
          <div class="team-name-sm" style="color:${tc(def.t2)}">${t2.name}</div>
          <div class="games-won">${gw.t2}</div>
          ${m.done?`<div class="match-pts-label">${pts.t2} match pts</div>`:''}
        </div>
      </div>
      ${gamesHtml}
      ${resultHtml}
      <div class="reset-row">
        <button class="reset-btn" onclick="resetMatch(${matchId})">↺ Reset Match</button>
      </div>
    </div>
  `;
}

function setTournamentMode(mode) {
  if (mode === tournamentMode) return;
  // Safety: confirm before switching if the current mode has data.
  // Nothing is deleted — the other mode has its own stored state.
  let hasData = false;
  if (tournamentMode === 'mlp') {
    const matches = (state && state.matches) || [];
    hasData = matches.some(m => ((m && m.games) || []).some(g => g.s1>0 || g.s2>0 || g.done));
  } else if (tournamentMode === 'rr') {
    hasData = !!(rrState && rrState.games && rrState.games.length > 0);
  } else if (tournamentMode === 'ppa') {
    hasData = !!(ppaState && ppaState.games && ppaState.games.length > 0);
  }
  if (hasData) {
    const labels = { mlp:'MLP', rr:'Round Robin', ppa:'PPA' };
    if (!confirm(`Switch to ${labels[mode]}? Your ${labels[tournamentMode]} data stays saved — you can switch back anytime from Settings.`)) return;
  }
  tournamentMode = mode;
  localStorage.setItem('tournament_mode', mode);
  hideSettings();
  const labels = { mlp:'MLP', rr:'Round Robin', ppa:'PPA' };
  toast('Switched to ' + labels[mode]);
  render();
}

function styleBar() {
  return `
    <div class="style-bar">
      <button class="style-btn ${tournamentMode==='mlp'?'active':''}" onclick="setTournamentMode('mlp')">MLP</button>
      <button class="style-btn ${tournamentMode==='rr'?'active':''}" onclick="setTournamentMode('rr')">Round Robin</button>
      <button class="style-btn ${tournamentMode==='ppa'?'active':''}" onclick="setTournamentMode('ppa')">PPA</button>
    </div>
  `;
}

const _escMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => _escMap[c]);
}

// Brief bottom-center confirmation — fades in, fades out.
let toastTimer = null;
function toast(msg, ms) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast'; el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  // Force reflow so the transition triggers even on rapid calls
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms || 1400);
}

// Swap #app innerHTML while preserving scroll position and input focus/caret.
// Focused elements are identified by a stable data-focus-key set by renderers.
function swapApp(html) {
  const prevScroll = window.scrollY;
  const active = document.activeElement;
  let focusKey = null, selStart = null, selEnd = null;
  if (active && active.dataset && active.dataset.focusKey) {
    focusKey = active.dataset.focusKey;
    if (typeof active.selectionStart === 'number') {
      selStart = active.selectionStart; selEnd = active.selectionEnd;
    }
  }
  const app = document.getElementById('app');
  if (app) app.innerHTML = html;
  renderSyncBar();
  if (focusKey) {
    const next = document.querySelector(`[data-focus-key="${focusKey}"]`);
    if (next) {
      try {
        next.focus();
        if (selStart !== null && typeof next.setSelectionRange === 'function') {
          next.setSelectionRange(selStart, selEnd);
        }
      } catch(_) {}
    }
  }
  window.scrollTo(0, prevScroll);
}

// ─── Wake lock: keep screen on during live games ───
let wakeLock = null;
let wakeLockPending = false;
async function updateWakeLock() {
  if (wakeLockPending) return;
  const wantLock = tournamentMode === 'rr' && rrView === 'games';
  if (wantLock && !wakeLock && 'wakeLock' in navigator) {
    wakeLockPending = true;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch (_) { wakeLock = null; }
    wakeLockPending = false;
  } else if (!wantLock && wakeLock) {
    const w = wakeLock; wakeLock = null;
    try { await w.release(); } catch (_) {}
  }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) updateWakeLock(); });

function render() {
  if (tournamentMode === 'rr') { renderRR(); updateWakeLock(); return; }
  if (tournamentMode === 'ppa') { renderPPA(); updateWakeLock(); return; }
  updateWakeLock();

  const nav = `
    <nav class="nav">
      <button onclick="setView('matches')" class="${currentView==='matches'?'active':''}">Matches</button>
      <button onclick="setView('standings')" class="${currentView==='standings'?'active':''}">Standings</button>
    </nav>
    <div class="sync-bar sync-pending" id="sync-status-bar"></div>
  `;
  const body = currentView==='matches' ? renderMatchesView() : renderStandings();
  swapApp(nav + body);
}

function editScore(matchId, gi, team, current, color) {
  if (document.getElementById('score-edit-overlay')) return;
  const el = document.createElement('div');
  el.className = 'score-edit-overlay'; el.id = 'score-edit-overlay';
  el.onclick = e => { if (e.target===el) el.remove(); };
  const m2 = getMatch(matchId);
  const _k1 = m2.t1key || SCHEDULE[matchId]?.t1;
  const _k2 = m2.t2key || SCHEDULE[matchId]?.t2;
  const teamLabel = team===1 ? T(_k1).name : T(_k2).name;
  el.innerHTML = `
    <div class="score-edit-sheet">
      <div class="score-edit-handle"></div>
      <div class="score-edit-label" style="color:${color}">${teamLabel} — ${gi===4?'Dreambreaker':['Women\'s','Men\'s','Mixed 1','Mixed 2'][gi]}</div>
      <input class="score-edit-input" id="score-edit-input" type="number" min="0" max="99"
        value="${current}" inputmode="numeric" style="border-color:${color}" />
      <div class="score-edit-btns">
        <button class="score-edit-cancel" onclick="document.getElementById('score-edit-overlay').remove()">Cancel</button>
        <button class="score-edit-confirm" onclick="confirmScoreEdit('${matchId}',${gi},${team})" style="background:${color};color:#000">Set Score</button>
      </div>
    </div>
  `;
  document.body.appendChild(el);
  const input = document.getElementById('score-edit-input');
  input.focus(); input.select();
  input.onkeydown = e => { if (e.key==='Enter') confirmScoreEdit(matchId, gi, team); };
}

function confirmScoreEdit(matchId, gi, team) {
  const val = parseInt(document.getElementById('score-edit-input')?.value);
  if (isNaN(val) || val < 0) return;
  const m = getMatch(matchId);
  const game = gi===4 ? m.db : m.games[gi];
  if (game.done) return;
  if (team===1) game.s1 = val; else game.s2 = val;
  document.getElementById('score-edit-overlay')?.remove();
  save(); render();
}

function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;width:100vw;height:100vh';
  document.body.appendChild(canvas);
  const W = canvas.width  = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#ef4444','#60a5fa','#4ade80','#facc15','#fff','#f472b6','#fb923c'];
  const pieces = Array.from({length:120}, ()=>({
    x: Math.random()*W, y: Math.random()*H - H,
    r: Math.random()*6+3,
    color: colors[Math.floor(Math.random()*colors.length)],
    vx: (Math.random()-0.5)*4,
    vy: Math.random()*4+2,
    spin: (Math.random()-0.5)*0.2,
    angle: Math.random()*Math.PI*2,
    shape: Math.random()>0.5 ? 'rect' : 'circle',
    w: Math.random()*10+5, h: Math.random()*5+3,
  }));
  let frame, start = performance.now();
  function draw(ts) {
    ctx.clearRect(0,0,W,H);
    const elapsed = ts - start;
    const fade = Math.max(0, 1 - (elapsed-2500)/1000);
    ctx.globalAlpha = fade;
    pieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin;
      if (p.y>H+10) { p.y=-10; p.x=Math.random()*W; }
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      if (p.shape==='rect') ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      else { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    if (elapsed < 3500) frame = requestAnimationFrame(draw);
    else canvas.remove();
  }
  frame = requestAnimationFrame(draw);
}

function currentRulesSet() {
  return tournamentMode === 'rr' ? RULES_RR : RULES;
}

function rulesBodyHtml(lang) {
  const R = currentRulesSet();
  const r = R[lang] || R.en;
  return r.sections.map(sec => {
    const heading = `<h3>${sec.heading}</h3>`;
    if (sec.pts) {
      const pts = sec.pts.map(([v,d])=>`<div class="pts-val">${v}</div><div class="pts-desc">${d}</div>`).join('');
      return heading + `<div class="pts-grid">${pts}</div>`;
    }
    const rows = sec.rows.map(([icon,text])=>
      `<div class="rule-row"><span class="rule-icon">${icon}</span><span>${text}</span></div>`
    ).join('');
    return heading + rows;
  }).join('');
}

function setRulesLang(lang) {
  rulesLang = lang;
  localStorage.setItem('mlp_rules_lang', lang);
  const body = document.getElementById('rules-body');
  const title = document.getElementById('rules-title');
  const closeBtn = document.getElementById('rules-close-btn');
  const R = currentRulesSet();
  const rl = R[lang] || R.en;
  if (body) body.innerHTML = rulesBodyHtml(lang);
  if (title) title.textContent = rl.title;
  if (closeBtn) closeBtn.textContent = rl.close;
  const sheet = document.querySelector('.rules-sheet');
  if (sheet) sheet.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
  ['en','ko','zh','mn','fa'].forEach(l => {
    const btn = document.getElementById('lang-btn-'+l);
    if (btn) btn.className = 'lang-btn' + (l===lang?' lang-active':'');
  });
}

function showRules() {
  if (document.getElementById('rules-overlay')) return;
  const el = document.createElement('div');
  el.className = 'rules-overlay'; el.id = 'rules-overlay';
  el.onclick = e => { if (e.target === el) el.remove(); };
  el.innerHTML = `
    <div class="rules-sheet" dir="${rulesLang === 'fa' ? 'rtl' : 'ltr'}">
      <div class="rules-handle"></div>
      <button onclick="document.getElementById('rules-overlay').remove()" aria-label="Close" style="position:absolute;top:10px;right:12px;background:#1a1a1a;border:1px solid #2a2a2a;color:#ddd;width:34px;height:34px;border-radius:50%;font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2">\u00d7</button>
      <div class="lang-picker">
        <button id="lang-btn-en" class="lang-btn${rulesLang==='en'?' lang-active':''}" onclick="setRulesLang('en')">EN</button>
        <button id="lang-btn-ko" class="lang-btn${rulesLang==='ko'?' lang-active':''}" onclick="setRulesLang('ko')">한국어</button>
        <button id="lang-btn-zh" class="lang-btn${rulesLang==='zh'?' lang-active':''}" onclick="setRulesLang('zh')">中文</button>
        <button id="lang-btn-mn" class="lang-btn${rulesLang==='mn'?' lang-active':''}" onclick="setRulesLang('mn')">Монгол</button>
        <button id="lang-btn-fa" class="lang-btn${rulesLang==='fa'?' lang-active':''}" onclick="setRulesLang('fa')">فارسی</button>

function defaultRRState() {
  return {
    id: 'rr_' + Date.now(),
    name: 'Women\u2019s Round Robin',
    createdAt: Date.now(),
    completed: false,
    players: RR_DEFAULT_PLAYERS.map(p => ({...p})),
    gamesPerPlayer: 6,
    numCourts: 3,
    games: [],
    draft: { picks: {} },
    semi1: null, semi2: null, gold: null, bronze: null,
  };
}

function rrTotalGames() {
  const P = rrState.players.filter(p => p && !p.dropped).length;
  const gpp = rrState.gamesPerPlayer || 6;
  // Each game uses 4 player-slots, total player-slots = P * gpp, total games = P*gpp/4
  return Math.ceil(P * gpp / 4);
}

function rrMigrateState(s) {
  if (!s || typeof s !== 'object') return defaultRRState();
  const d = defaultRRState();
  if (!Array.isArray(s.players) || s.players.length < 4) s.players = d.players;
  // Convert legacy string players -> { name, dupr: null, dropped: false }
  s.players = s.players.map(p => {
    if (typeof p === 'string') return { name: p, dupr: null, dropped: false };
    if (p && typeof p === 'object') return { name: p.name || '?', dupr: typeof p.dupr==='number'?p.dupr:null, dropped: !!p.dropped };
    return { name: '?', dupr: null, dropped: false };
  });
  if (typeof s.gamesPerPlayer !== 'number' || s.gamesPerPlayer < 1) s.gamesPerPlayer = d.gamesPerPlayer;
  if (typeof s.numCourts !== 'number' || s.numCourts < 1) s.numCourts = d.numCourts;
  if (!Array.isArray(s.games)) s.games = [];
  if (!s.draft || typeof s.draft !== 'object') s.draft = { picks: {} };
  if (!s.draft.picks || typeof s.draft.picks !== 'object') s.draft.picks = {};
  if (s.semi1 === undefined) s.semi1 = null;
  if (s.semi2 === undefined) s.semi2 = null;
  if (s.gold === undefined) s.gold = null;
  if (s.bronze === undefined) s.bronze = null;
  if (typeof s.id !== 'string') s.id = 'rr_' + (s.createdAt || Date.now());
  if (typeof s.name !== 'string') s.name = d.name;
  if (typeof s.createdAt !== 'number') s.createdAt = Date.now();
  if (typeof s.completed !== 'boolean') s.completed = false;
  return s;
}

function loadRRState() {
  try { const s = localStorage.getItem('rr_v1'); if (s) return rrMigrateState(JSON.parse(s)); } catch(e){}
  return defaultRRState();
}

  const stored = localStorage.getItem('view_mode');
  // Organizer is password-gated. Devices without the authed flag must re-enter.
  if (stored === 'organizer' && localStorage.getItem('organizer_authed') !== '1') {
    localStorage.setItem('view_mode', 'player');
    return 'player';
  }
  return stored === 'organizer' ? 'organizer' : 'player';
})(); // 'organizer' | 'player'

function setIdentity(idx) {
  const raw = (idx === '' || idx === null || idx === undefined) ? null : parseInt(idx);
  myIdentity = (raw === null || isNaN(raw)) ? null : raw;
  if (myIdentity === null) localStorage.removeItem('rr_identity');
  else localStorage.setItem('rr_identity', String(myIdentity));
  // Refresh sheet if open so the selector reflects the new value.
  if (document.getElementById('settings-overlay')) showSettings();
  toast(myIdentity === null ? 'Signed out' : 'Signed in as ' + rrPlayerName(myIdentity));
  render();
}
const ORGANIZER_PASSWORD = 'TerryBoomer';
function setViewMode(mode) {
  const next = mode === 'player' ? 'player' : 'organizer';
  if (next === 'organizer' && viewMode !== 'organizer') {
    const entered = prompt('Enter organizer password:');
    if (entered === null) return;
    if (entered !== ORGANIZER_PASSWORD) {
      toast('Don\u2019t you dare \ud83d\ude1c');
      return;
    }
    localStorage.setItem('organizer_authed', '1');
  }
  if (next === 'player') localStorage.removeItem('organizer_authed');
  viewMode = next;
  localStorage.setItem('view_mode', viewMode);
  // In player view, force Games tab as landing (Setup is hidden).
  if (viewMode === 'player' && rrView === 'setup') rrView = 'games';
  // Refresh sheet so the active button state flips, then show a toast.
  if (document.getElementById('settings-overlay')) showSettings();
  toast(viewMode === 'player' ? 'Player view on' : 'Organizer view on');
  render();
}

function loadArchive() {

function saveArchive() {
  localStorage.setItem('rr_archive', JSON.stringify(rrArchive));
  if (FIREBASE_URL) {
    fetch(FIREBASE_URL + '/rr_archive.json', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(rrArchive) }).catch(()=>{});

function archiveCurrentTournament() {
  if (!rrState || !rrState.games || rrState.games.length === 0) return false;
  const snap = JSON.parse(JSON.stringify(rrState));
  snap.completed = true;
  snap.archivedAt = Date.now();
  rrArchive.unshift(snap);
  if (rrArchive.length > 30) rrArchive.length = 30;
  saveArchive();
  return true;
}
function startNewTournament() {
  if (rrState.games && rrState.games.length > 0) {
    const ok = confirm('Archive the current tournament and start a new one?');
    if (!ok) return;
    archiveCurrentTournament();
  }
  rrState = defaultRRState();
  const name = prompt('Name this tournament (optional):', 'Round Robin — ' + new Date().toLocaleDateString());
  if (name) rrState.name = name;
  rrSetView('setup');
  rrSave(); hideSettings(); render();
}

function deleteArchivedTournament(id) {
  if (!confirm('Delete this archived tournament permanently?')) return;
  rrArchive = rrArchive.filter(t => t.id !== id);
  saveArchive();
  showSettings();
}

// ─── Personalized helpers ───
function rrMyNextGame() {
  if (myIdentity === null || !rrState.games) return null;
  for (let i = 0; i < rrState.games.length; i++) {
    const g = rrState.games[i];
    if (g.done) continue;
    const t1 = g.team1 || [], t2 = g.team2 || [];
    if (t1.includes(myIdentity)) {
      const partner = t1.find(x => x !== myIdentity);
      return { idx:i, g, partner, opponents:t2, onMyTeam:1 };
    }
    if (t2.includes(myIdentity)) {
      const partner = t2.find(x => x !== myIdentity);
      return { idx:i, g, partner, opponents:t1, onMyTeam:2 };
    }
  }
  return null;

function rrSave() {
  localStorage.setItem('rr_v1', JSON.stringify(rrState));
  if (!FIREBASE_URL) return;
  clearTimeout(rrSaveTimer);
  rrSaveTimer = setTimeout(() => {
    rrLocalWrite = true;
    fetch(FIREBASE_URL + '/rr_state.json', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(rrState)
    }).catch(()=>{ rrLocalWrite = false; });
  }, 150);
}
let rrSaveTimer = null;
let rrLocalWrite = false;
let rrSyncSource = null;

function rrDiffNewlyDone(prev, next) {
  const msgs = [];
  if (!prev || !next) return msgs;
  const prevGames = prev.games || [], nextGames = next.games || [];
  // If the games array length changed, drop/regen happened -- skip toasts to avoid
  // false positives from shifted done games landing in previously-incomplete slots.
  if (prevGames.length === nextGames.length) {
    for (let i = 0; i < nextGames.length; i++) {
      const pg = prevGames[i], ng = nextGames[i];
      if (ng && ng.done && !(pg && pg.done)) {
        msgs.push(`\u2713 Game ${i+1} final: ${ng.s1}\u2013${ng.s2}`);
      }
    }
  }
  ['semi1','semi2','gold','bronze'].forEach(k => {
    const pg = prev[k], ng = next[k];
    if (ng && ng.done && !(pg && pg.done)) {
      msgs.push(`\u2713 ${ng.label || k} final: ${ng.s1}\u2013${ng.s2}`);
    }
  });
  return msgs;
}

function rrInitSync() {
  if (rrSyncSource) { rrSyncSource.close(); rrSyncSource = null; }
  if (!FIREBASE_URL) return;
  rrSyncSource = new EventSource(FIREBASE_URL + '/rr_state.json');
  rrSyncSource.addEventListener('put', e => {
    try {
      const payload = JSON.parse(e.data);
      if (payload.data) {
        if (rrLocalWrite) { rrLocalWrite = false; return; }
        const prev = rrState;
        const next = rrMigrateState(payload.data);
        const newlyDone = rrDiffNewlyDone(prev, next);
        rrState = next;
        localStorage.setItem('rr_v1', JSON.stringify(rrState));
        if (tournamentMode === 'rr') render();
        refreshWelcome();
        newlyDone.forEach(msg => toast(msg, 2200));
      } else if (payload.path === '/' && payload.data === null) {
        rrSave();
      }
    } catch(_) {}
  });
  // One-shot archive fetch so archives show up on any device.
  fetch(FIREBASE_URL + '/rr_archive.json')
    .then(r => r.json())
    .then(data => {
      if (Array.isArray(data) && data.length) {
        rrArchive = data;
        localStorage.setItem('rr_archive', JSON.stringify(rrArchive));
      }
    })
    .catch(()=>{});
}
