// ─── Game Generation: balanced random pairing ───
function rrShuffle(arr) {
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Generate N games. Schedule is arranged into rounds: each round, as many concurrent games
// as courts allow, with every player in at most one game per round — this guarantees
// no duplicate players within a single game. We generate many candidate schedules and pick
// the one with the lowest total penalty: partner repeats, opponent repeats, and DUPR
// imbalance within each game. Within a game, teams are balanced by "snake" pairing
// (high+low vs mid+mid) so the sum of DUPRs on each side is as close as possible.
function rrGenerateGames(players, numGames, numCourts) {
  const P = players.length;
  const perRound = Math.min(numCourts, Math.floor(P / 4));
  if (perRound < 1) return [];
  const totalRounds = Math.ceil(numGames / perRound);

  // Cache DUPRs for scoring (missing DUPR = 3.5 fallback so it doesn't dominate).
  const duprs = players.map(p => {
    if (p && typeof p === 'object' && typeof p.dupr === 'number') return p.dupr;
    return 3.5;
  });

  // Balance a 4-player set into two teams by DUPR.
  // Sort by DUPR desc → pair highest with lowest, mid with mid. This minimises the
  // sum-difference between teams for a fixed set of 4.
  function balanceTeams(four) {
    const sorted = four.slice().sort((a, b) => duprs[b] - duprs[a]);
    // sorted = [top, hi-mid, lo-mid, bottom] by DUPR
    return { team1: [sorted[0], sorted[3]], team2: [sorted[1], sorted[2]] };
  }

  function attempt() {
    const played = Array(P).fill(0);
    const games = [];
    for (let r = 0; r < totalRounds; r++) {
      const indices = rrShuffle([...Array(P).keys()]);
      indices.sort((a, b) => played[a] - played[b]);
      const playing = rrShuffle(indices.slice(0, perRound * 4));
      for (let g = 0; g < perRound; g++) {
        if (games.length >= numGames) break;
        const four = playing.slice(g * 4, g * 4 + 4);
        if (four.length < 4) break;
        four.forEach(p => played[p]++);
        const { team1, team2 } = balanceTeams(four);
        games.push({
          i: games.length,
          round: r + 1,
          court: g + 1,
          team1, team2,
          s1: 0, s2: 0, done: false, winner: null,
        });
      }
    }
    return games;
  }

  function score(games) {
    const pairCount = {}; // partnered together
    const oppCount = {};  // opposed each other
    let partnerPenalty = 0, opponentPenalty = 0, duprPenalty = 0;

    for (const g of games) {
      // Partner pairs (inside team)
      const pk1 = g.team1.slice().sort((a, b) => a - b).join('_');
      const pk2 = g.team2.slice().sort((a, b) => a - b).join('_');
      pairCount[pk1] = (pairCount[pk1] || 0) + 1;
      pairCount[pk2] = (pairCount[pk2] || 0) + 1;

      // Opponent pairs (across teams)
      for (const a of g.team1) for (const b of g.team2) {
        const ok = a < b ? a + '_' + b : b + '_' + a;
        oppCount[ok] = (oppCount[ok] || 0) + 1;
      }

      // DUPR balance within game (the snake pairing already minimises this,
      // but blowouts can still occur if the 4 players are very spread out).
      const t1Sum = duprs[g.team1[0]] + duprs[g.team1[1]];
      const t2Sum = duprs[g.team2[0]] + duprs[g.team2[1]];
      const diff = Math.abs(t1Sum - t2Sum);
      duprPenalty += diff * diff; // squared so 0.8 is way worse than 0.4

      // Extra hard penalty if "2 best vs 2 worst" style happens: one team has the
      // top-2 DUPRs and the other has the bottom-2 — gap ≥ ~0.6 after snake pairing
      // is practically impossible, but be defensive.
      if (diff > 1.0) duprPenalty += 20;
    }

    for (const k in pairCount) if (pairCount[k] > 1) partnerPenalty += Math.pow(pairCount[k] - 1, 2) * 50;
    for (const k in oppCount) if (oppCount[k] > 1) opponentPenalty += Math.pow(oppCount[k] - 1, 2) * 5;

    return partnerPenalty + opponentPenalty + duprPenalty;
  }

  let best = null, bestScore = Infinity;
  // 400 candidates — fast (<50 ms for 12 players) and consistently finds near-optimal.
  for (let iter = 0; iter < 400; iter++) {
    const games = attempt();
    const sc = score(games);
    if (sc < bestScore) { bestScore = sc; best = games; if (sc === 0) break; }
  }
  return best || [];
}

// ─── Actions ───
function rrUpdatePlayer(idx, name) {
  if (!rrState.players[idx] || typeof rrState.players[idx] === 'string') {
    rrState.players[idx] = { name, dupr: null };
  } else {
    rrState.players[idx].name = name;
  }
  rrSave();
}
function rrUpdatePlayerDUPR(idx, val) {
  const n = parseFloat(val);
  if (!rrState.players[idx] || typeof rrState.players[idx] === 'string') {
    rrState.players[idx] = { name: typeof rrState.players[idx]==='string'?rrState.players[idx]:'?', dupr: isNaN(n)?null:n };
  } else {
    rrState.players[idx].dupr = isNaN(n) ? null : n;
  }
  rrSave();
}
function rrUpdateConfig(key, val) {
  const n = parseInt(val);
  if (!isNaN(n) && n > 0) { rrState[key] = n; rrSave(); render(); }
}
function rrUpdateName(name) { rrState.name = name || 'Tournament'; rrSave(); }
function rrLoadApr19Players() {
  const hasAny = rrState.players.length > 0 || rrState.games.length > 0;
  if (hasAny && !confirm('Replace current players with the 12 Apr 19 players and clear any generated games?')) return;
  rrState.players = RR_DEFAULT_PLAYERS.map(p => ({ ...p }));
  rrClearSchedule();
  // Identity may now point at a different player — clear it.
  if (myIdentity !== null && myIdentity >= rrState.players.length) setIdentity(null);
  rrSave(); render();
}
function rrClearSchedule() {
  rrState.games = [];
  rrState.draft = { picks: {} };
  rrState.semi1 = null; rrState.semi2 = null; rrState.gold = null; rrState.bronze = null;
}
function rrAddPlayer() {
  if (rrState.games.length > 0) {
    if (!confirm('Adding a player will clear the current schedule. Continue?')) return;
    rrClearSchedule();
  }
  rrState.players.push({ name: 'Player ' + (rrState.players.length + 1), dupr: null });
  rrSave(); render();
}
function rrRemovePlayer(idx) {
  if (rrState.players.length <= 4) { alert('Need at least 4 players.'); return; }
  if (rrState.games.length > 0) {
    if (!confirm('Removing a player will clear the current schedule. Continue?')) return;
    rrClearSchedule();
  }
  rrState.players.splice(idx, 1);
  // If removed player was the current identity, clear it.
  if (myIdentity !== null && myIdentity === idx) setIdentity(null);
  else if (myIdentity !== null && myIdentity > idx) { myIdentity = myIdentity - 1; localStorage.setItem('rr_identity', String(myIdentity)); }
  rrSave(); render();
}
function rrGenerateAll() {
  if (rrState.games.some(g => g.done || g.s1>0 || g.s2>0)) {
    if (!confirm('This will overwrite all current games and scores. Continue?')) return;
  }
  const total = rrTotalGames();
  rrState.games = rrGenerateGames(rrState.players, total, rrState.numCourts);
  rrState.draft = { picks: {} };
  rrState.semi1 = null; rrState.semi2 = null; rrState.gold = null; rrState.bronze = null;
  rrSave(); rrSetView('games');
}

function rrAdj(gameKey, team, delta) {
  const g = rrGetGame(gameKey);
  if (!g || g.done) return;
  if (team===1) g.s1 = Math.max(0, g.s1 + delta);
  else g.s2 = Math.max(0, g.s2 + delta);
  rrSave(); render();
}

function rrGetGame(key) {
  if (key === 'semi1') return rrState.semi1;
  if (key === 'semi2') return rrState.semi2;
  if (key === 'gold') return rrState.gold;
  if (key === 'bronze') return rrState.bronze;
  return rrState.games[parseInt(key)];
}

function rrMarkDone(gameKey) {
  const g = rrGetGame(gameKey);
  if (!g) return;
  if (g.s1 === g.s2) { alert("Scores tied — can't complete."); return; }
  g.done = true;
  g.winner = g.s1 > g.s2 ? 't1' : 't2';
  launchConfetti();
  // Auto-advance semis → gold/bronze
  if (gameKey === 'semi1' || gameKey === 'semi2') rrMaybeAdvanceSemis();
  rrSave(); render();
}

function rrUndoGame(gameKey) {
  const g = rrGetGame(gameKey);
  if (!g) return;
  g.done = false; g.winner = null;
  // If undoing a semi, clear gold/bronze
  if (gameKey === 'semi1' || gameKey === 'semi2') {
    rrState.gold = null; rrState.bronze = null;
  }
  rrSave(); render();
}

function rrSetScoreInline(gameKey, team, val) {
  const n = parseInt(val);
  if (isNaN(n) || n < 0) return;
  const g = rrGetGame(gameKey);
  if (!g || g.done) return;
  if (team===1) g.s1 = n; else g.s2 = n;
  rrSave(); render();
}

function rrResetGame(gameKey) {
  if (!confirm('Reset this game? Its score will be cleared.')) return;
  const g = rrGetGame(gameKey);
  if (!g) return;
  g.s1 = 0; g.s2 = 0; g.done = false; g.winner = null;
  if (gameKey === 'semi1' || gameKey === 'semi2') {
    rrState.gold = null; rrState.bronze = null;
  }
  rrSave(); render();
}

function rrResetAll() {
  if (!confirm('Reset this entire tournament? All scores and games will be lost.')) return;
  rrState = defaultRRState();
  rrSave(); render();
}

// ─── Standings ───
function rrStandings() {
  const stats = rrState.players.map((_, idx) => ({
    idx, name: rrPlayerName(idx), dupr: rrPlayerDUPR(idx), pf: 0, pa: 0, gp: 0, gw: 0
  }));
  rrState.games.forEach(g => {
    if (!g.done) return;
    g.team1.forEach(p => {
      if (stats[p]) { stats[p].pf += g.s1; stats[p].pa += g.s2; stats[p].gp++; if (g.winner==='t1') stats[p].gw++; }
    });
    g.team2.forEach(p => {
      if (stats[p]) { stats[p].pf += g.s2; stats[p].pa += g.s1; stats[p].gp++; if (g.winner==='t2') stats[p].gw++; }
    });
  });
  return stats.map(s => ({ ...s, diff: s.pf - s.pa }))
    .sort((a,b) => b.pf - a.pf || b.diff - a.diff || b.gw - a.gw);
}

function rrRRComplete() {
  return rrState.games.length > 0 && rrState.games.every(g => g.done);
}

// ─── Draft Pick & Playoffs ───
function rrDraftComplete() {
  return [0,1,2,3].every(r => rrState.draft && rrState.draft.picks && rrState.draft.picks[r] != null);
}

function rrDraftPick(rank, partnerIdx) {
  if (!rrState.draft) rrState.draft = { picks: {} };
  rrState.draft.picks[rank] = partnerIdx;
  // Auto-fill the 4th if only one remaining
  const st = rrStandings();
  const top4Picked = [0,1,2,3].map(r => rrState.draft.picks[r]).filter(v => v != null);
  const bottom4 = [4,5,6,7].map(r => st[r] ? st[r].idx : null).filter(v => v != null);
  const remaining = bottom4.filter(i => !top4Picked.includes(i));
  if (remaining.length === 1) {
    for (let r=0;r<4;r++) if (rrState.draft.picks[r] == null) rrState.draft.picks[r] = remaining[0];
  }
  if (rrDraftComplete()) rrBuildSemis();
  rrSave(); render();
}

function rrUndoDraft() {
  if (!confirm('Redo draft? Picks and playoff matches will be reset.')) return;
  rrState.draft = { picks: {} };
  rrState.semi1 = null; rrState.semi2 = null; rrState.gold = null; rrState.bronze = null;
  rrSave(); render();
}

function rrBuildSemis() {
  const st = rrStandings();
  const picks = rrState.draft.picks;
  // Teams: rank 0 team = [rank0.idx, picks[0]], etc.
  const teamA = [st[0].idx, picks[0]]; // 1st + pick
  const teamB = [st[1].idx, picks[1]]; // 2nd + pick
  const teamC = [st[2].idx, picks[2]]; // 3rd + pick
  const teamD = [st[3].idx, picks[3]]; // 4th + pick
  // Standard bracket: 1 vs 4, 2 vs 3
  rrState.semi1 = { court: 1, team1: teamA, team2: teamD, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 1 · 1 vs 4' };
  rrState.semi2 = { court: 2, team1: teamB, team2: teamC, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 2 · 2 vs 3' };
}

function rrMaybeAdvanceSemis() {
  const s1 = rrState.semi1, s2 = rrState.semi2;
  if (s1 && s1.done && s2 && s2.done) {
    const s1W = s1.winner === 't1' ? s1.team1 : s1.team2;
    const s1L = s1.winner === 't1' ? s1.team2 : s1.team1;
    const s2W = s2.winner === 't1' ? s2.team1 : s2.team2;
    const s2L = s2.winner === 't1' ? s2.team2 : s2.team1;
    if (!rrState.gold) rrState.gold = { court: 1, team1: s1W, team2: s2W, s1: 0, s2: 0, done: false, winner: null, label: 'Gold Medal' };
    if (!rrState.bronze) rrState.bronze = { court: 2, team1: s1L, team2: s2L, s1: 0, s2: 0, done: false, winner: null, label: 'Bronze Medal' };
  }
}

// ─── Render ───
function rrNames(arr) {
  if (!arr || !arr.length) return '';
  return arr.map(i => `<span class="rr-player-pill">${rrPlayerName(i)}</span>`).join('');
}

function rrGameCard(g, gameKey, title) {
  let badge, badgeClass;
  if (g.done) { badge='Final'; badgeClass='badge-done'; }
  else if (g.s1>0 || g.s2>0) { badge='Live'; badgeClass='badge-live'; }
  else { badge='Upcoming'; badgeClass='badge-upcoming'; }

  const w1 = g.done && g.winner==='t1';
  const w2 = g.done && g.winner==='t2';
  const inThisGame = typeof myIdentity === 'number' && (
    (g.team1 || []).indexOf(myIdentity) !== -1 ||
    (g.team2 || []).indexOf(myIdentity) !== -1
  );
  const readOnly = viewMode === 'player' && !inThisGame;

  let scoreHtml;
  if (g.done) {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side" style="justify-content:center">
          <div class="score-num-big" style="color:${w1?'#60a5fa':'#fff'}">${g.s1}</div>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right" style="justify-content:center">
          <div class="score-num-big" style="color:${w2?'#f472b6':'#fff'}">${g.s2}</div>
        </div>
      </div>
      ${readOnly ? '' : `<div style="text-align:center;margin-top:4px">
        <button class="undo-btn" onclick="rrUndoGame('${gameKey}')">Undo</button>
      </div>`}
    `;
  } else if (readOnly) {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side" style="justify-content:center">
          <div class="score-num-big" style="color:#60a5fa">${g.s1}</div>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right" style="justify-content:center">
          <div class="score-num-big" style="color:#f472b6">${g.s2}</div>
        </div>
      </div>
    `;
  } else {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side">
          <button class="score-tap" onclick="rrAdj('${gameKey}',1,1)" style="color:#60a5fa">+</button>
          <input class="score-num-big" type="number" min="0" value="${g.s1}"
            data-focus-key="rr-${gameKey}-1"
            onchange="rrSetScoreInline('${gameKey}',1,this.value)"
            onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
            style="color:#60a5fa"/>
          <button class="score-tap minus" onclick="rrAdj('${gameKey}',1,-1)">−</button>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right">
          <button class="score-tap minus" onclick="rrAdj('${gameKey}',2,-1)">−</button>
          <input class="score-num-big" type="number" min="0" value="${g.s2}"
            data-focus-key="rr-${gameKey}-2"
            onchange="rrSetScoreInline('${gameKey}',2,this.value)"
            onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
            style="color:#f472b6"/>
          <button class="score-tap" onclick="rrAdj('${gameKey}',2,1)" style="color:#f472b6">+</button>
        </div>
      </div>
      <button class="done-btn" onclick="rrMarkDone('${gameKey}')">Mark Game Done ✓</button>
    `;
  }

  const t1Names = g.team1.map(i => rrPlayerName(i)).join(' & ');
  const t2Names = g.team2.map(i => rrPlayerName(i)).join(' & ');

  let resultHtml = '';
  if (g.done) {
    const winNames = g.winner==='t1' ? t1Names : t2Names;
    resultHtml = `<div class="result-banner" style="background:#0f2a0f;color:#4ade80">${winNames} win!</div>`;
  }

  return `
    <div class="rr-round-card" ${!g.done && (g.s1>0||g.s2>0)?'id="active-match"':''}>
      <div class="rr-round-top">
        <span class="rr-round-title">${title} · Court ${g.court||1}</span>
        <span class="badge ${badgeClass}">${badge}</span>
      </div>
      <div class="rr-game-card${g.done?' complete':''}">
        <div class="rr-team-row">
          <div class="rr-team-names t1">${t1Names}</div>
          <div class="rr-vs">vs</div>
          <div class="rr-team-names t2 right">${t2Names}</div>
        </div>
        ${scoreHtml}
      </div>
      ${resultHtml}
      <div class="reset-row">
        <button class="reset-btn" onclick="rrResetGame('${gameKey}')">↺ Reset</button>
      </div>
    </div>
  `;
}

function rrRenderSetup() {
  const canRemove = rrState.players.length > 4;
  const playerRows = rrState.players.map((p, i) => {
    const name = rrPlayerName(i);
    const dupr = rrPlayerDUPR(i);
    return `
      <div class="rr-player-row" style="grid-template-columns:26px 1fr 70px 32px">
        <div class="rr-player-num">${i+1}.</div>
        <input class="rr-player-input" value="${(name||'').replace(/"/g,'&quot;')}"
          data-focus-key="rr-pname-${i}"
          oninput="rrUpdatePlayer(${i}, this.value)" placeholder="Player ${i+1}"/>
        <input class="rr-player-input" type="number" step="0.01" min="0"
          data-focus-key="rr-pdupr-${i}"
          value="${dupr!=null?dupr:''}" placeholder="DUPR"
          onchange="rrUpdatePlayerDUPR(${i}, this.value)"/>
        ${canRemove
          ? `<button onclick="rrRemovePlayer(${i})" style="width:32px;height:32px;background:#2a2a2a;border:none;border-radius:8px;color:#666;font-size:16px;cursor:pointer">×</button>`
          : '<div></div>'}
      </div>`;
  }).join('');

  const hasGames = rrState.games.length > 0;
  const started = rrState.games.some(g => g.done || g.s1>0 || g.s2>0);

  const totalGames = rrTotalGames();
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Round Robin Setup</h1>
        <p>${rrState.players.length} players · ${rrState.gamesPerPlayer} games each · ${totalGames} total games</p>
      </div>

      <div class="rr-subsection-label">Players · ${rrState.players.length}</div>
      <div style="padding: 0 12px 8px">
        <button onclick="rrLoadApr19Players()" style="width:100%;padding:11px;background:#1a2a3f;border:1px solid #3a5f8a;border-radius:9px;color:#60a5fa;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:0.3px">
          ⬇ Load Apr 19 Players (12 with DUPR)
        </button>
      </div>
      <div style="padding: 0 12px">
        ${playerRows}
        <button onclick="rrAddPlayer()" style="width:100%;margin-top:4px;padding:10px;background:#1e1e1e;border:1px dashed #333;border-radius:9px;color:#888;font-size:13px;font-weight:700;cursor:pointer">
          + Add Player
        </button>
      </div>

      <div class="rr-subsection-label">Configuration</div>
      <div style="padding: 0 12px">
        <div class="rr-config-grid">
          <div class="rr-config-item">
            <div class="rr-config-label">Games / Player</div>
            <input class="rr-config-input" type="number" min="1" max="20"
              value="${rrState.gamesPerPlayer}" onchange="rrUpdateConfig('gamesPerPlayer', this.value)"/>
          </div>
          <div class="rr-config-item">
            <div class="rr-config-label">Courts</div>
            <input class="rr-config-input" type="number" min="1"
              value="${rrState.numCourts}" onchange="rrUpdateConfig('numCourts', this.value)"/>
          </div>
        </div>
        <div style="color:#666;font-size:12px;margin:10px 4px;line-height:1.5">
          ${rrState.players.length} players × ${rrState.gamesPerPlayer} games each ÷ 4 players per game
          = <strong style="color:#ccc">${totalGames}</strong> total games
          (${Math.ceil(totalGames / rrState.numCourts)} rounds of ${rrState.numCourts}-court play).
        </div>
      </div>

      <button class="rr-generate-btn" onclick="rrGenerateAll()">
        ${hasGames ? '🎲 Regenerate All Games' : '🎲 Generate Random Games'}
      </button>

      ${hasGames ? `
        <div style="padding: 4px 16px 0; color:#888; font-size:12px; text-align:center">
          ${started ? '⚠️ Regenerating will reset all scores.' : 'Games ready. Tap Games tab to start.'}
        </div>
      ` : ''}

      <div class="page-pad"></div>
    </div>
  `;
}

function rrRenderGames() {
  if (!rrState.games.length) {
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>No games yet</h2>
          <p>Go to Setup → tap <strong>Generate Random Games</strong> to begin.</p>
          <button class="rr-generate-btn" style="max-width:260px;margin:20px auto;display:block" onclick="rrSetView('setup')">Go to Setup</button>
        </div>
      </div>
    `;
  }
  // Group by round (skipping done games unless rrShowDone is on)
  const mineOnly = viewMode === 'player' && typeof myIdentity === 'number';
  const inMyGame = (g) => {
    const all = (g.team1 || []).concat(g.team2 || []);
    return all.indexOf(myIdentity) !== -1;
  };
  const pool = mineOnly ? rrState.games.filter(inMyGame) : rrState.games;
  const totalDone = pool.filter(g => g.done).length;
  const total = pool.length;
  const rounds = {};
  pool.forEach((g) => {
    if (g.done && !rrShowDone) return;
    const r = g.round || 1;
    const i = rrState.games.indexOf(g);
    if (!rounds[r]) rounds[r] = [];
    rounds[r].push({ g, i });
  });
  const hasVisible = Object.keys(rounds).length > 0;
  const gamesHtml = hasVisible ? Object.keys(rounds).sort((a,b)=>a-b).map(r => {
    const rGames = rounds[r];
    const allRGames = pool.filter(g => (g.round||1) === Number(r));
    const done = allRGames.filter(g => g.done).length;
    const inner = rGames.map(x => rrGameCard(x.g, String(x.i), `Game ${x.i+1}`)).join('');
    return `
      <div class="round-header">Round ${r} · ${done}/${allRGames.length} done</div>
      ${inner}
    `;
  }).join('') : `
    <div style="padding:40px 20px;text-align:center;color:#666">
      <div style="font-size:40px;margin-bottom:10px">🎉</div>
      <div style="font-weight:700;color:#eee;font-size:15px;margin-bottom:4px">${mineOnly ? 'All your games complete' : 'All games complete'}</div>
      <div style="font-size:12px">Toggle below to see finished games.</div>
    </div>
  `;

  const filterPill = `
    <div style="padding:8px 12px 4px;display:flex;justify-content:space-between;align-items:center;gap:10px">
      <span style="color:#888;font-size:12px">${totalDone} / ${total} games complete</span>
      <button onclick="rrToggleShowDone()"
        style="background:${rrShowDone?'#1a2a3f':'#1a1a1a'};border:1px solid ${rrShowDone?'#3a5f8a':'#333'};color:${rrShowDone?'#60a5fa':'#888'};padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">
        ${rrShowDone ? '✓ Showing finished' : 'Show finished'}
      </button>
    </div>
  `;

  const subhead = mineOnly
    ? `Your games only \u00b7 ${rrShowDone ? 'all' : 'upcoming &amp; live'}`
    : (rrShowDone ? 'All games' : 'Upcoming &amp; live games only');
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Round Robin</h1>
        <p>${subhead}</p>
      </div>
      ${filterPill}
      ${gamesHtml}
      ${viewMode === 'player' ? '' : `
        <div style="padding:16px 12px;text-align:center">
          <button class="rr-generate-btn warn" style="max-width:260px;display:inline-block" onclick="rrResetAll()">↺ Reset Entire Tournament</button>
        </div>`}
      <div class="page-pad"></div>
    </div>
  `;
}

function rrRenderStandings() {
  const st = rrStandings();
  if (!st.length) return '<div class="rr-coming-soon">No players yet.</div>';

  const rrDone = rrRRComplete();
  const rows = st.map((row, i) => {
    let badgeCls = 'top8';
    if (i === 0) badgeCls = 'gold';
    else if (i === 1) badgeCls = 'silver';
    else if (i === 2) badgeCls = 'bronze';
    else if (i >= 8) badgeCls = '';
    return `
      <div class="rr-standings-row">
        <div class="rr-rank-badge ${badgeCls}">${i+1}</div>
        <div class="rr-player-name">${row.name || 'Player '+(row.idx+1)}</div>
        <div class="rr-stat primary">${row.pf}</div>
        <div class="rr-stat">${row.diff>0?'+':''}${row.diff}</div>
        <div class="rr-stat">${row.gw}/${row.gp}</div>
        <div class="rr-stat">${row.pa}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Individual Standings</h1>
        <p>${rrDone ? 'Round robin complete · Top 4 move to draft' : 'Ranked by points scored, then differential, then wins'}</p>
      </div>
      <div class="card">
        <div class="rr-standings-row header-row">
          <span></span><span>Player</span>
          <span style="text-align:center">PF</span>
          <span style="text-align:center">+/−</span>
          <span style="text-align:center">W/G</span>
          <span style="text-align:center">PA</span>
        </div>
        ${rows}
      </div>
      <div class="card-label" style="margin:16px 12px 0">Scoring</div>
      <div class="card">
        <div class="info-card">
          <div>🎯 <strong>PF</strong> — Points scored (primary rank). Score high even in losses.</div>
          <div>📊 <strong>+/−</strong> — Point differential (tiebreak 1)</div>
          <div>🏆 <strong>W/G</strong> — Wins / games played (tiebreak 2)</div>
          <div>🛡️ <strong>PA</strong> — Points against you</div>
          <div style="margin-top:6px;color:#facc15">Top 4 choose partners from ranks 5-8 for semis.</div>
        </div>
      </div>
      <div class="page-pad"></div>
    </div>
  `;
}

function rrRenderPlayoffs() {
  if (rrState.players.length < 8) {
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>Playoffs unavailable</h2>
          <p>The playoff draft format needs at least <strong>8 players</strong> (top 4 + draft pool 5-8).</p>
          <p style="margin-top:8px;color:#666">Currently ${rrState.players.length} players.</p>
        </div>
      </div>
    `;
  }
  if (!rrRRComplete()) {
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>Playoffs locked</h2>
          <p>Complete all ${rrState.games.length || rrTotalGames()} round-robin games to unlock draft &amp; playoffs.</p>
          <p style="margin-top:8px;color:#666">${rrState.games.filter(g=>g.done).length} / ${rrState.games.length || rrTotalGames()} done</p>
        </div>
      </div>
    `;
  }

  const st = rrStandings();
  const top4 = st.slice(0, 4);
  const bottom4 = st.slice(4, 8);
  const picks = (rrState.draft && rrState.draft.picks) || {};

  // Draft UI
  let draftHtml = '';
  if (!rrDraftComplete()) {
    // Find next drafter
    let nextRank = [0,1,2,3].find(r => picks[r] == null);
    const pickedIdxs = [0,1,2,3].map(r => picks[r]).filter(v => v != null);
    const available = bottom4.filter(p => !pickedIdxs.includes(p.idx));

    const currentTeams = [0,1,2,3].map(r => {
      const top = top4[r];
      if (picks[r] != null) {
        const partner = st.find(s => s.idx === picks[r]);
        return `<div style="padding:10px 14px;border-top:1px solid #252525">
          <div style="font-size:10px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">Team ${String.fromCharCode(65+r)}</div>
          <div style="font-size:13px;color:#fff;font-weight:700">${top.name} <span style="color:#666">(${r+1})</span> + ${partner.name} <span style="color:#666">(${st.indexOf(partner)+1})</span></div>
        </div>`;
      }
      const isNext = r === nextRank;
      return `<div style="padding:10px 14px;border-top:1px solid #252525;${isNext?'background:#1e2a3f':''}">
        <div style="font-size:10px;color:${isNext?'#60a5fa':'#666'};font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">Team ${String.fromCharCode(65+r)} ${isNext?'· On the clock':''}</div>
        <div style="font-size:13px;color:#fff;font-weight:700">${top.name} <span style="color:#666">(${r+1})</span> + <span style="color:#666">?</span></div>
      </div>`;
    }).join('');

    const canPick = viewMode === 'organizer' || (typeof myIdentity === 'number' && myIdentity === top4[nextRank].idx);
    const pickerHtml = available.length === 0 ? '' : (canPick ? `
      <div class="card" style="margin-top:16px">
        <div class="card-label" style="padding:12px 14px 4px">
          ${viewMode === 'organizer' ? `Pick #${nextRank+1} \u2014 ` : ''}${top4[nextRank].name} (rank ${nextRank+1}) \u00b7 Pick partner
        </div>
        <div style="padding:0 12px 12px">
          ${available.map(p => {
            const rank = st.indexOf(p) + 1;
            return `<button onclick="rrDraftPick(${nextRank}, ${p.idx})"
              style="display:block;width:100%;margin-bottom:8px;padding:14px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;text-align:left">
              <span style="color:#60a5fa">Rank ${rank}</span> \u00b7 ${p.name}
              <span style="float:right;color:#666;font-size:12px">${p.gw}W \u00b7 ${p.diff>0?'+':''}${p.diff}</span>
            </button>`;
          }).join('')}
        </div>
      </div>
    ` : `
      <div class="card" style="margin-top:16px;padding:16px;text-align:center;color:#9ab6dd">
        \u23f3 Waiting for <strong style="color:#fff">${top4[nextRank].name}</strong> (rank ${nextRank+1}) to pick a partner\u2026
      </div>
    `);

    draftHtml = `
      <div class="card-label" style="margin:16px 12px 0">Team Draft</div>
      <div class="card">
        <div class="info-card" style="padding:12px 14px">
          Top 4 players pick partners from ranks 5-8, in order.
        </div>
        ${currentTeams}
      </div>
      ${pickerHtml}
    `;
  }

  // Bracket UI (visible once draft complete)
  let bracketHtml = '';
  if (rrDraftComplete()) {
    const semi1Html = rrState.semi1 ? rrGameCard(rrState.semi1, 'semi1', '🥈 ' + rrState.semi1.label) : '';
    const semi2Html = rrState.semi2 ? rrGameCard(rrState.semi2, 'semi2', '🥈 ' + rrState.semi2.label) : '';
    const goldHtml = rrState.gold ? rrGameCard(rrState.gold, 'gold', '🏆 ' + rrState.gold.label) :
      `<div class="rr-bracket-card">
         <div class="rr-bracket-top" style="background:#1f1c00">
           <span class="rr-bracket-label" style="color:#facc15">🏆 Gold Medal</span>
           <span class="badge badge-upcoming">Locked</span>
         </div>
         <div style="padding:16px;text-align:center;color:#666;font-size:13px">Complete both semis to unlock</div>
       </div>`;
    const bronzeHtml = rrState.bronze ? rrGameCard(rrState.bronze, 'bronze', '🥉 ' + rrState.bronze.label) :
      `<div class="rr-bracket-card">
         <div class="rr-bracket-top" style="background:#1a1400">
           <span class="rr-bracket-label" style="color:#cd7f32">🥉 Bronze Medal</span>
           <span class="badge badge-upcoming">Locked</span>
         </div>
         <div style="padding:16px;text-align:center;color:#666;font-size:13px">Complete both semis to unlock</div>
       </div>`;

    bracketHtml = `
      <div class="rr-subsection-label">Semifinals</div>
      ${semi1Html}
      ${semi2Html}
      <div class="rr-subsection-label">Medal Matches</div>
      ${goldHtml}
      ${bronzeHtml}
      <div style="padding:12px 12px 0;text-align:center">
        <button class="reset-btn" style="font-size:11px" onclick="rrUndoDraft()">↺ Redo Draft</button>
      </div>
    `;
  }

  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Playoffs</h1>
        <p>${rrDraftComplete() ? 'Bracket locked in' : 'Draft your partner'}</p>
      </div>
      ${draftHtml}
      ${bracketHtml}
      <div class="page-pad"></div>
    </div>
  `;
}

function renderRR() {
  const rrDone = rrRRComplete();
  const isPlayer = viewMode === 'player';
  if (isPlayer && rrView === 'setup') rrView = 'games';
  const setupBtn = isPlayer ? '' :
    `<button onclick="rrSetView('setup')" class="${rrView==='setup'?'active':''}">Setup</button>`;
  const nav = `
    <nav class="nav">
      ${setupBtn}
      <button onclick="rrSetView('games')"     class="${rrView==='games'?'active':''}">Games</button>
      <button onclick="rrSetView('standings')" class="${rrView==='standings'?'active':''}">Standings</button>
      <button onclick="rrSetView('playoffs')"  class="${rrView==='playoffs'?'active':''}" style="${rrDone?'':'opacity:0.6'}">Playoffs</button>
    </nav>
    <div class="sync-bar sync-pending" id="sync-status-bar"></div>
  `;
  let body;
  if (rrView === 'setup') body = rrRenderSetup();
  else if (rrView === 'games') body = rrMyCard() + rrRenderGames();
  else if (rrView === 'standings') body = rrMyCard() + rrRenderStandings();
  else if (rrView === 'playoffs') body = rrRenderPlayoffs();
  else body = rrRenderSetup();

  swapApp(nav + body);
}

window.addEventListener('error', (e) => {
  const app = document.getElementById('app');
  if (app && !app.innerHTML) {
    app.innerHTML = `<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;line-height:1.6">
      <strong style="color:#fff;font-size:14px">Error loading app</strong><br><br>
      ${(e.message||'').replace(/</g,'&lt;')}<br>
      <span style="color:#888">${(e.filename||'').replace(/</g,'&lt;')}:${e.lineno||''}:${e.colno||''}</span>
    </div>`;
  }
});

try {
  render();
  initSync();
  rrInitSync();
  if (localStorage.getItem('welcomed') !== '1') showWelcome();
} catch (err) {
  document.getElementById('app').innerHTML = `<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;line-height:1.6">
    <strong style="color:#fff;font-size:14px">Startup error</strong><br><br>
    ${(err.message||'').replace(/</g,'&lt;')}<br><br>
    <pre style="color:#888;white-space:pre-wrap;font-size:11px">${(err.stack||'').replace(/</g,'&lt;')}</pre>
  </div>`;
}

// Inject the floating rules button once
const fab = document.createElement('button');
fab.className = 'rules-fab'; fab.title = 'Rules'; fab.textContent = '?';
fab.onclick = showRules;
document.body.appendChild(fab);

// Inject the settings gear FAB (sits to the left of the rules FAB)
const gearFab = document.createElement('button');
gearFab.className = 'settings-fab'; gearFab.title = 'Settings'; gearFab.textContent = '⚙';
gearFab.onclick = showSettings;
document.body.appendChild(gearFab);
</script>
</body>
</html>
