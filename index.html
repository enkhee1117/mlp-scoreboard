// ─── Game Generation: balanced random pairing ───
function rrShuffle(arr) {
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Generate N games. Schedule is arranged into rounds: each round, as many concurrent games
// as courts allow, with every player in at most one game per round — this guarantees
// no duplicate players within a single game. We generate many candidate schedules and pick
// the one with the lowest total penalty: partner repeats, opponent repeats, and DUPR
// imbalance within each game. Within a game, teams are balanced by "snake" pairing
// (high+low vs mid+mid) so the sum of DUPRs on each side is as close as possible.
function rrGenerateGames(players, numGames, numCourts) {
  const P = players.length;
  const perRound = Math.min(numCourts, Math.floor(P / 4));
  if (perRound < 1) return [];
  const totalRounds = Math.ceil(numGames / perRound);

  // Cache DUPRs for scoring (missing DUPR = 3.5 fallback so it doesn't dominate).
  const duprs = players.map(p => {
    if (p && typeof p === 'object' && typeof p.dupr === 'number') return p.dupr;
    return 3.5;
  });

  // Balance a 4-player set into two teams by DUPR.
  // Sort by DUPR desc → pair highest with lowest, mid with mid. This minimises the
  // sum-difference between teams for a fixed set of 4.
  function balanceTeams(four) {
    const sorted = four.slice().sort((a, b) => duprs[b] - duprs[a]);
    // sorted = [top, hi-mid, lo-mid, bottom] by DUPR
    return { team1: [sorted[0], sorted[3]], team2: [sorted[1], sorted[2]] };
  }

  function attempt() {
    const played = Array(P).fill(0);
    const games = [];
    let r = 0;
    while (games.length < numGames && r < totalRounds + 2) {
      // How many games fit in this round — might be fewer than perRound on the last round.
      const thisRound = Math.min(perRound, numGames - games.length);
      // Pick only as many players as will actually play this round. This avoids
      // "selected but bumped" imbalances when the last round is truncated.
      const indices = rrShuffle([...Array(P).keys()]);
      indices.sort((a, b) => played[a] - played[b]);
      const playing = rrShuffle(indices.slice(0, thisRound * 4));
      for (let g = 0; g < thisRound; g++) {
        const four = playing.slice(g * 4, g * 4 + 4);
        if (four.length < 4) break;
        four.forEach(p => played[p]++);
        const { team1, team2 } = balanceTeams(four);
        games.push({
          i: games.length,
          round: r + 1,
          court: g + 1,
          team1, team2,
          s1: 0, s2: 0, done: false, winner: null,
        });
      }
      r++;
    }
    return games;
  }

  function score(games) {
    const pairCount = {}; // partnered together
    const oppCount = {};  // opposed each other
    let partnerPenalty = 0, opponentPenalty = 0, duprPenalty = 0;

    for (const g of games) {
      // Partner pairs (inside team)
      const pk1 = g.team1.slice().sort((a, b) => a - b).join('_');
      const pk2 = g.team2.slice().sort((a, b) => a - b).join('_');
      pairCount[pk1] = (pairCount[pk1] || 0) + 1;
      pairCount[pk2] = (pairCount[pk2] || 0) + 1;

      // Opponent pairs (across teams)
      for (const a of g.team1) for (const b of g.team2) {
        const ok = a < b ? a + '_' + b : b + '_' + a;
        oppCount[ok] = (oppCount[ok] || 0) + 1;
      }

      // DUPR balance within game (the snake pairing already minimises this,
      // but blowouts can still occur if the 4 players are very spread out).
      const t1Sum = duprs[g.team1[0]] + duprs[g.team1[1]];
      const t2Sum = duprs[g.team2[0]] + duprs[g.team2[1]];
      const diff = Math.abs(t1Sum - t2Sum);
      duprPenalty += diff * diff; // squared so 0.8 is way worse than 0.4

      // Extra hard penalty if "2 best vs 2 worst" style happens: one team has the
      // top-2 DUPRs and the other has the bottom-2 — gap ≥ ~0.6 after snake pairing
      // is practically impossible, but be defensive.
      if (diff > 1.0) duprPenalty += 20;
    }

    for (const k in pairCount) if (pairCount[k] > 1) partnerPenalty += Math.pow(pairCount[k] - 1, 2) * 50;
    for (const k in oppCount) if (oppCount[k] > 1) opponentPenalty += Math.pow(oppCount[k] - 1, 2) * 5;

    return partnerPenalty + opponentPenalty + duprPenalty;
  }

  let best = null, bestScore = Infinity;
  // 400 candidates — fast (<50 ms for 12 players) and consistently finds near-optimal.
  for (let iter = 0; iter < 400; iter++) {
    const games = attempt();
    const sc = score(games);
    if (sc < bestScore) { bestScore = sc; best = games; if (sc === 0) break; }
  }
  return best || [];
}

// ─── Actions ───
function rrUpdatePlayer(idx, name) {
  if (!rrState.players[idx] || typeof rrState.players[idx] === 'string') {
    rrState.players[idx] = { name, dupr: null };
  } else {
    rrState.players[idx].name = name;
  }
  rrSave();
}
function rrUpdatePlayerDUPR(idx, val) {
  const n = parseFloat(val);
  if (!rrState.players[idx] || typeof rrState.players[idx] === 'string') {
    rrState.players[idx] = { name: typeof rrState.players[idx]==='string'?rrState.players[idx]:'?', dupr: isNaN(n)?null:n };
  } else {
    rrState.players[idx].dupr = isNaN(n) ? null : n;
  }
  rrSave();
}
function rrUpdateConfig(key, val) {
  const n = parseInt(val);
  if (!isNaN(n) && n > 0) { rrState[key] = n; rrSave(); render(); }
}
function rrUpdateName(name) { rrState.name = name || 'Tournament'; rrSave(); }
function rrLoadApr19Players() {
  const hasAny = rrState.players.length > 0 || rrState.games.length > 0;
  if (hasAny && !confirm('Replace current players with the 12 Apr 19 players and clear any generated games?')) return;
  rrState.players = RR_DEFAULT_PLAYERS.map(p => ({ ...p }));
  rrClearSchedule();
  // Identity may now point at a different player — clear it.
  if (myIdentity !== null && myIdentity >= rrState.players.length) setIdentity(null);
  rrSave(); render();
}
function rrClearSchedule() {
  rrState.games = [];
  rrState.draft = { picks: {} };
  rrState.semi1 = null; rrState.semi2 = null; rrState.gold = null; rrState.bronze = null;
}
function rrAddPlayer() {
  if (rrState.games.length > 0) {
    if (!confirm('Adding a player will clear the current schedule. Continue?')) return;
    rrClearSchedule();
  }
  rrState.players.push({ name: 'Player ' + (rrState.players.length + 1), dupr: null, dropped: false });
  rrSave(); render();
}
function rrRemovePlayer(idx) {
  if (rrState.players.length <= 4) { alert('Need at least 4 players.'); return; }
  if (rrState.games.length > 0) {
    if (!confirm('Removing a player will clear the current schedule. Continue?')) return;
    rrClearSchedule();
  }
  rrState.players.splice(idx, 1);
  // If removed player was the current identity, clear it.
  if (myIdentity !== null && myIdentity === idx) setIdentity(null);
  else if (myIdentity !== null && myIdentity > idx) { myIdentity = myIdentity - 1; localStorage.setItem('rr_identity', String(myIdentity)); }
  rrSave(); render();
}
function rrDropPlayer(idx) {
  const p = rrState.players[idx];
  if (!p || p.dropped) return;
  const activeCount = rrState.players.filter(q => q && !q.dropped).length;
  if (activeCount <= 4) { alert('At least 4 active players required. Regenerate or add players first.'); return; }
  const incomplete = rrState.games.filter(g =>
    !g.done && ((g.team1||[]).includes(idx) || (g.team2||[]).includes(idx))
  ).length;
  const msg = `Drop ${rrPlayerNameRaw(idx)} from the tournament?\n\n` +
    `\u2022 ${incomplete} incomplete game${incomplete===1?'':'s'} removed (their teammates play fewer)\n` +
    `\u2022 Past completed games stay in standings\n` +
    `\u2022 They won't appear in future regenerations\n\n` +
    `Cannot be undone automatically.`;
  if (!confirm(msg)) return;
  rrState.games = rrState.games.filter(g =>
    g.done || (!(g.team1||[]).includes(idx) && !(g.team2||[]).includes(idx))
  );
  rrState.games.forEach((g, i) => { g.i = i; });
  const inBracket = (bg) => bg && ((bg.team1||[]).includes(idx) || (bg.team2||[]).includes(idx));
  const hasDraftPicks = rrState.draft && rrState.draft.picks && Object.keys(rrState.draft.picks).length > 0;
  const top8 = rrActiveStandings().slice(0, 8).map(s => s.idx);
  const affectsDraft = hasDraftPicks && top8.includes(idx);
  if (affectsDraft || inBracket(rrState.semi1) || inBracket(rrState.semi2) ||
      inBracket(rrState.gold) || inBracket(rrState.bronze)) {
    rrState.draft = { picks: {} };
    rrState.semi1 = null; rrState.semi2 = null;
    rrState.gold = null; rrState.bronze = null;
  }
  p.dropped = true;
  if (myIdentity === idx) setIdentity(null);
  rrSave(); render();
  toast(`${rrPlayerNameRaw(idx)} dropped. ${incomplete} game${incomplete===1?'':'s'} removed.`, 3000);
}
function rrUndropPlayer(idx) {
  const p = rrState.players[idx];
  if (!p || !p.dropped) return;
  if (!confirm(`Un-drop ${rrPlayerNameRaw(idx)}?\n\nTheir removed games are gone. To play again, regenerate the schedule.`)) return;
  p.dropped = false;
  rrSave(); render();
}
function rrGenerateAll() {
  if (rrState.games.some(g => g.done || g.s1>0 || g.s2>0)) {
    if (!confirm('This will overwrite all current games and scores. Continue?')) return;
  }
  const activeIdxs = rrState.players.map((p, i) => p && !p.dropped ? i : -1).filter(i => i >= 0);
  if (activeIdxs.length < 4) { alert('Need at least 4 active (non-dropped) players.'); return; }
  const activePlayers = activeIdxs.map(i => rrState.players[i]);
  const total = rrTotalGames();
  // Generate in the active-only index space, then remap to global player indices.
  const localGames = rrGenerateGames(activePlayers, total, rrState.numCourts);
  rrState.games = localGames.map(g => ({
    ...g,
    team1: (g.team1 || []).map(li => activeIdxs[li]),
    team2: (g.team2 || []).map(li => activeIdxs[li]),
  }));
  rrState.draft = { picks: {} };
  rrState.semi1 = null; rrState.semi2 = null; rrState.gold = null; rrState.bronze = null;
  // Verify balance: every player should be within the mathematical min/max range.
  // For P players and G games, total slots = G*4, so min = floor(4G/P), max = ceil(4G/P).
  // Anyone outside [min, max] is a real imbalance bug; spread of 1 is unavoidable when P*gpp isn't a multiple of 4.
  const counts = new Array(rrState.players.length).fill(0);
  rrState.games.forEach(g => {
    (g.team1 || []).forEach(i => { if (i >= 0 && i < counts.length) counts[i]++; });
    (g.team2 || []).forEach(i => { if (i >= 0 && i < counts.length) counts[i]++; });
  });
  const activeIdxSet = new Set(rrState.players.map((p,i)=>p&&!p.dropped?i:-1).filter(i=>i>=0));
  const P = activeIdxSet.size;
  const G = rrState.games.length;
  const lo = P ? Math.floor(4 * G / P) : 0;
  const hi = P ? Math.ceil(4 * G / P) : 0;
  const offenders = counts.map((c, i) => ({ i, c })).filter(x => activeIdxSet.has(x.i) && (x.c < lo || x.c > hi));
  if (offenders.length) {
    const detail = offenders.map(x => `${rrPlayerNameRaw(x.i)}:${x.c}`).join(', ');
    toast(`Uneven schedule — expected ${lo===hi?lo:lo+'\u2013'+hi}/player. ${detail}`, 3500);
  } else if (lo !== hi) {
    const highCount = counts.filter((c, i) => activeIdxSet.has(i) && c === hi).length;
    toast(`Schedule balanced: ${P - highCount} play ${lo}, ${highCount} play ${hi}.`, 2500);
  }
  rrSave(); rrSetView('games');
}

// Pickleball clamp: cap at 11 unless the other team is at 10+ (deuce), then other+2.
function clampPickleScore(raw, other, cap) {
  cap = cap || 11;
  const max = other < (cap - 1) ? cap : other + 2;
  return Math.max(0, Math.min(max, raw));
}

function rrAdj(gameKey, team, delta) {
  const g = rrGetGame(gameKey);
  if (!g || g.done) return;
  if (team === 1) {
    const clamped = clampPickleScore(g.s1 + delta, g.s2);
    if (delta > 0 && clamped === g.s1) { toast('Win by 2 \u2014 max ' + clamped + '.', 1200); return; }
    g.s1 = clamped;
  } else {
    const clamped = clampPickleScore(g.s2 + delta, g.s1);
    if (delta > 0 && clamped === g.s2) { toast('Win by 2 \u2014 max ' + clamped + '.', 1200); return; }
    g.s2 = clamped;
  }
  rrSave(); render();
}

function rrGetGame(key) {
  if (key === 'semi1') return rrState.semi1;
  if (key === 'semi2') return rrState.semi2;
  if (key === 'gold') return rrState.gold;
  if (key === 'bronze') return rrState.bronze;
  return rrState.games[parseInt(key)];
}

function rrMarkDone(gameKey) {
  const g = rrGetGame(gameKey);
  if (!g) return;
  if (g.s1 === g.s2) { alert("Scores tied — can't complete."); return; }
  const hi = Math.max(g.s1, g.s2);
  const margin = Math.abs(g.s1 - g.s2);
  if (hi < 11 || margin < 2) {
    if (!confirm(`Unusual score ${g.s1}–${g.s2} (rules: 11, win by 2). Submit anyway?`)) return;
  }
  g.done = true;
  g.winner = g.s1 > g.s2 ? 't1' : 't2';
  // Confetti for playoffs or the signed-in player's own win only.
  const isPlayoff = gameKey === 'semi1' || gameKey === 'semi2' || gameKey === 'gold' || gameKey === 'bronze';
  const winTeam = g.winner === 't1' ? g.team1 : g.team2;
  const myWin = typeof myIdentity === 'number' && winTeam && winTeam.indexOf(myIdentity) !== -1;
  if (isPlayoff || myWin) launchConfetti();
  if (gameKey === 'semi1' || gameKey === 'semi2') rrMaybeAdvanceSemis();
  const label = isPlayoff ? (g.label || 'Playoff') : `Game ${parseInt(gameKey)+1}`;
  toast(`\u2713 ${label} saved: ${g.s1}\u2013${g.s2}`, 1800);
  rrSave(); render();
}

function rrUndoGame(gameKey) {
  const g = rrGetGame(gameKey);
  if (!g) return;
  g.done = false; g.winner = null;
  // If undoing a semi, clear gold/bronze
  if (gameKey === 'semi1' || gameKey === 'semi2') {
    rrState.gold = null; rrState.bronze = null;
  }
  rrSave(); render();
}

function rrSetScoreInline(gameKey, team, val) {
  const n = parseInt(val);
  if (isNaN(n) || n < 0) return;
  const g = rrGetGame(gameKey);
  if (!g || g.done) return;
  if (team === 1) g.s1 = clampPickleScore(n, g.s2);
  else g.s2 = clampPickleScore(n, g.s1);
  rrSave(); render();
}

function rrResetGame(gameKey) {
  if (!confirm('Reset this game? Its score will be cleared.')) return;
  const g = rrGetGame(gameKey);
  if (!g) return;
  g.s1 = 0; g.s2 = 0; g.done = false; g.winner = null;
  if (gameKey === 'semi1' || gameKey === 'semi2') {
    rrState.gold = null; rrState.bronze = null;
  }
  rrSave(); render();
}

function rrResetAll() {
  if (!confirm('Reset this entire tournament? All scores and games will be lost.')) return;
  rrState = defaultRRState();
  rrSave(); render();
}

// ─── Standings ───
function rrStandings() {
  const stats = rrState.players.map((_, idx) => ({
    idx, name: rrPlayerName(idx), dupr: rrPlayerDUPR(idx), pf: 0, pa: 0, gp: 0, gw: 0
  }));
  rrState.games.forEach(g => {
    if (!g.done) return;
    g.team1.forEach(p => {
      if (stats[p]) { stats[p].pf += g.s1; stats[p].pa += g.s2; stats[p].gp++; if (g.winner==='t1') stats[p].gw++; }
    });
    g.team2.forEach(p => {
      if (stats[p]) { stats[p].pf += g.s2; stats[p].pa += g.s1; stats[p].gp++; if (g.winner==='t2') stats[p].gw++; }
    });
  });
  return stats.map(s => {
      const diff = s.pf - s.pa;
      const ppg = s.gp > 0 ? s.pf / s.gp : 0;
      const diffPg = s.gp > 0 ? diff / s.gp : 0;
      const winPct = s.gp > 0 ? s.gw / s.gp : 0;
      return { ...s, diff, ppg, diffPg, winPct };
    })
    .sort((a,b) => b.ppg - a.ppg || b.diffPg - a.diffPg || b.winPct - a.winPct);
}

function rrRRComplete() {
  return rrState.games.length > 0 && rrState.games.every(g => g.done);
}

// ─── Draft Pick & Playoffs ───
function rrDraftComplete() {
  return [0,1,2,3].every(r => rrState.draft && rrState.draft.picks && rrState.draft.picks[r] != null);
}

function rrDraftPick(rank, partnerIdx) {
  if (!rrState.draft) rrState.draft = { picks: {} };
  rrState.draft.picks[rank] = partnerIdx;
  // Auto-fill the 4th if only one remaining
  const st = rrActiveStandings();
  const top4Picked = [0,1,2,3].map(r => rrState.draft.picks[r]).filter(v => v != null);
  const bottom4 = [4,5,6,7].map(r => st[r] ? st[r].idx : null).filter(v => v != null);
  const remaining = bottom4.filter(i => !top4Picked.includes(i));
  if (remaining.length === 1) {
    for (let r=0;r<4;r++) if (rrState.draft.picks[r] == null) rrState.draft.picks[r] = remaining[0];
  }
  if (rrDraftComplete()) rrBuildSemis();
  rrSave(); render();
}

function rrUndoDraft() {
  if (!confirm('Redo draft? Picks and playoff matches will be reset.')) return;
  rrState.draft = { picks: {} };
  rrState.semi1 = null; rrState.semi2 = null; rrState.gold = null; rrState.bronze = null;
  rrSave(); render();
}

function rrActiveStandings() {
  return rrStandings().filter(s => { const p = rrState.players[s.idx]; return p && !p.dropped; });
}
function rrBuildSemis() {
  const st = rrActiveStandings();
  const picks = rrState.draft.picks;
  if (st.length < 4) { rrState.draft = { picks: {} }; rrState.semi1 = rrState.semi2 = null; return; }
  const teamA = [st[0].idx, picks[0]]; // 1st + pick
  const teamB = [st[1].idx, picks[1]]; // 2nd + pick
  const teamC = [st[2].idx, picks[2]]; // 3rd + pick
  const teamD = [st[3].idx, picks[3]]; // 4th + pick
  // Standard bracket: 1 vs 4, 2 vs 3
  rrState.semi1 = { court: 1, team1: teamA, team2: teamD, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 1 · 1 vs 4' };
  rrState.semi2 = { court: 2, team1: teamB, team2: teamC, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 2 · 2 vs 3' };
}

function rrMaybeAdvanceSemis() {
  const s1 = rrState.semi1, s2 = rrState.semi2;
  if (s1 && s1.done && s2 && s2.done) {
    const s1W = s1.winner === 't1' ? s1.team1 : s1.team2;
    const s1L = s1.winner === 't1' ? s1.team2 : s1.team1;
    const s2W = s2.winner === 't1' ? s2.team1 : s2.team2;
    const s2L = s2.winner === 't1' ? s2.team2 : s2.team1;
    if (!rrState.gold) rrState.gold = { court: 1, team1: s1W, team2: s2W, s1: 0, s2: 0, done: false, winner: null, label: 'Gold Medal' };
    if (!rrState.bronze) rrState.bronze = { court: 2, team1: s1L, team2: s2L, s1: 0, s2: 0, done: false, winner: null, label: 'Bronze Medal' };
  }
}

// ─── Render ───
function rrNames(arr) {
  if (!arr || !arr.length) return '';
  return arr.map(i => `<span class="rr-player-pill">${rrPlayerName(i)}</span>`).join('');
}

function rrGameCard(g, gameKey, title) {
  let badge, badgeClass;
  if (g.done) { badge='Final'; badgeClass='badge-done'; }
  else if (g.s1>0 || g.s2>0) { badge='Live'; badgeClass='badge-live'; }
  else { badge='Upcoming'; badgeClass='badge-upcoming'; }

  const w1 = g.done && g.winner==='t1';
  const w2 = g.done && g.winner==='t2';
  const inThisGame = typeof myIdentity === 'number' && (
    (g.team1 || []).indexOf(myIdentity) !== -1 ||
    (g.team2 || []).indexOf(myIdentity) !== -1
  );
  const readOnly = viewMode === 'player' && !inThisGame;

  let scoreHtml;
  if (g.done) {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side" style="justify-content:center">
          <div class="score-num-big" style="color:${w1?'#60a5fa':'#fff'}">${g.s1}</div>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right" style="justify-content:center">
          <div class="score-num-big" style="color:${w2?'#f472b6':'#fff'}">${g.s2}</div>
        </div>
      </div>
      ${readOnly ? '' : `<div style="text-align:center;margin-top:4px">
        <button class="undo-btn" onclick="rrUndoGame('${gameKey}')">Undo</button>
      </div>`}
    `;
  } else if (readOnly) {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side" style="justify-content:center">
          <div class="score-num-big" style="color:#60a5fa">${g.s1}</div>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right" style="justify-content:center">
          <div class="score-num-big" style="color:#f472b6">${g.s2}</div>
        </div>
      </div>
    `;
  } else {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side">
          <button class="score-tap" onclick="rrAdj('${gameKey}',1,1)" style="color:#60a5fa">+</button>
          <input class="score-num-big" type="number" min="0" value="${g.s1}"
            data-focus-key="rr-${gameKey}-1"
            onchange="rrSetScoreInline('${gameKey}',1,this.value)"
            onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
            style="color:#60a5fa"/>
          <button class="score-tap minus" onclick="rrAdj('${gameKey}',1,-1)">−</button>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right">
          <button class="score-tap minus" onclick="rrAdj('${gameKey}',2,-1)">−</button>
          <input class="score-num-big" type="number" min="0" value="${g.s2}"
            data-focus-key="rr-${gameKey}-2"
            onchange="rrSetScoreInline('${gameKey}',2,this.value)"
            onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
            style="color:#f472b6"/>
          <button class="score-tap" onclick="rrAdj('${gameKey}',2,1)" style="color:#f472b6">+</button>
        </div>
      </div>
      <button class="done-btn" onclick="rrMarkDone('${gameKey}')">Mark Game Done ✓</button>
    `;
  }

  const t1Names = g.team1.map(i => rrPlayerName(i)).join(' & ');
  const t2Names = g.team2.map(i => rrPlayerName(i)).join(' & ');

  let resultHtml = '';
  if (g.done) {
    const winNames = g.winner==='t1' ? t1Names : t2Names;
    resultHtml = `<div class="result-banner" style="background:#0f2a0f;color:#4ade80">${winNames} win!</div>`;
  }

  return `
    <div class="rr-round-card" id="rr-card-${gameKey}" data-active="${!g.done && (g.s1>0||g.s2>0)?'1':'0'}">
      <div class="rr-round-top">
        <span style="display:flex;align-items:center;gap:8px;min-width:0">
          ${rrCourtPillHtml(g.court)}
          <span class="rr-round-title">${title}</span>
        </span>
        <span class="badge ${badgeClass}">${badge}</span>
      </div>
      <div class="rr-game-card${g.done?' complete':''}">
        <div class="rr-team-row">
          <div class="rr-team-names t1">${t1Names}</div>
          <div class="rr-vs">vs</div>
          <div class="rr-team-names t2 right">${t2Names}</div>
        </div>
        ${scoreHtml}
      </div>
      ${resultHtml}
      <div class="reset-row">
        <button class="reset-btn" onclick="rrResetGame('${gameKey}')">↺ Reset</button>
      </div>
    </div>
  `;
}

function rrRenderSetup() {
  const activeCount = rrState.players.filter(p => p && !p.dropped).length;
  const canRemove = rrState.players.length > 4;
  const hasGames = rrState.games.length > 0;
  const playerRows = rrState.players.map((p, i) => {
    const name = rrPlayerName(i);
    const dupr = rrPlayerDUPR(i);
    const isDropped = !!(p && p.dropped);
    let btnHtml;
    if (isDropped) {
      btnHtml = `<button onclick="rrUndropPlayer(${i})" title="Restore player" style="width:32px;height:32px;background:#1a2a3f;border:1px solid #3a5f8a;border-radius:8px;color:#60a5fa;font-size:14px;cursor:pointer">↩</button>`;
    } else if (hasGames && activeCount > 4) {
      btnHtml = `<button onclick="rrDropPlayer(${i})" title="Drop from tournament (keeps past results)" style="width:32px;height:32px;background:#2a1f1a;border:1px solid #4a2f20;border-radius:8px;color:#f0a070;font-size:14px;cursor:pointer">⤵</button>`;
    } else if (!hasGames && canRemove) {
      btnHtml = `<button onclick="rrRemovePlayer(${i})" title="Remove from roster" style="width:32px;height:32px;background:#2a2a2a;border:none;border-radius:8px;color:#666;font-size:16px;cursor:pointer">×</button>`;
    } else {
      btnHtml = '<div></div>';
    }
    const rowStyle = isDropped ? 'opacity:0.5' : '';
    const droppedTag = isDropped ? `<span style="display:inline-block;margin-left:6px;padding:1px 6px;background:#2a2a2a;border-radius:4px;color:#f0a070;font-size:9px;font-weight:800;letter-spacing:0.5px">DROPPED</span>` : '';
    return `
      <div class="rr-player-row" style="grid-template-columns:26px 1fr 70px 32px;${rowStyle}">
        <div class="rr-player-num">${i+1}.${droppedTag}</div>
        <input class="rr-player-input" value="${(name||'').replace(/"/g,'&quot;')}"
          data-focus-key="rr-pname-${i}"
          ${isDropped ? 'disabled' : ''}
          oninput="rrUpdatePlayer(${i}, this.value)" placeholder="Player ${i+1}"/>
        <input class="rr-player-input" type="number" step="0.01" min="0"
          data-focus-key="rr-pdupr-${i}"
          ${isDropped ? 'disabled' : ''}
          value="${dupr!=null?dupr:''}" placeholder="DUPR"
          onchange="rrUpdatePlayerDUPR(${i}, this.value)"/>
        ${btnHtml}
      </div>`;
  }).join('');

  const started = rrState.games.some(g => g.done || g.s1>0 || g.s2>0);

  const totalGames = rrTotalGames();
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Round Robin Setup</h1>
        <p>${activeCount}${activeCount!==rrState.players.length?' active ('+(rrState.players.length-activeCount)+' dropped)':''} · ${rrState.gamesPerPlayer} games each · ${totalGames} total games</p>
      </div>

      <div class="rr-subsection-label">Players · ${rrState.players.length}</div>
      <div style="padding: 0 12px 8px">
        <button onclick="rrLoadApr19Players()" style="width:100%;padding:11px;background:#1a2a3f;border:1px solid #3a5f8a;border-radius:9px;color:#60a5fa;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:0.3px">
          ⬇ Load Apr 19 Players (12 with DUPR)
        </button>
      </div>
      <div style="padding: 0 12px">
        ${playerRows}
        <button onclick="rrAddPlayer()" style="width:100%;margin-top:4px;padding:10px;background:#1e1e1e;border:1px dashed #333;border-radius:9px;color:#888;font-size:13px;font-weight:700;cursor:pointer">
          + Add Player
        </button>
      </div>

      <div class="rr-subsection-label">Configuration</div>
      <div style="padding: 0 12px">
        <div class="rr-config-grid">
          <div class="rr-config-item">
            <div class="rr-config-label">Games / Player</div>
            <input class="rr-config-input" type="number" min="1" max="20"
              value="${rrState.gamesPerPlayer}" onchange="rrUpdateConfig('gamesPerPlayer', this.value)"/>
          </div>
          <div class="rr-config-item">
            <div class="rr-config-label">Courts</div>
            <input class="rr-config-input" type="number" min="1"
              value="${rrState.numCourts}" onchange="rrUpdateConfig('numCourts', this.value)"/>
          </div>
        </div>
        <div style="color:#666;font-size:12px;margin:10px 4px;line-height:1.5">
          ${activeCount} players × ${rrState.gamesPerPlayer} games each ÷ 4 players per game
          = <strong style="color:#ccc">${totalGames}</strong> total games
          (${Math.ceil(totalGames / rrState.numCourts)} rounds of ${rrState.numCourts}-court play).
        </div>
        ${rrState.gamesPerPlayer >= activeCount - 1 && activeCount >= 4 ? `
          <div style="margin:8px 4px 0;padding:10px 12px;background:#2a1f0a;border:1px solid #4a3810;border-radius:8px;color:#f0a070;font-size:12px;line-height:1.5">
            ⚠️ ${rrState.gamesPerPlayer} games/player with only ${activeCount} players means each player has ${activeCount - 1} possible partner${activeCount-1===1?'':'s'} — <strong>partner repeats are unavoidable</strong>. Lower games/player or add players to guarantee unique partners.
          </div>` : ''}
      </div>

      <button class="rr-generate-btn" onclick="rrGenerateAll()">
        ${hasGames ? '🎲 Regenerate All Games' : '🎲 Generate Random Games'}
      </button>

      ${hasGames ? `
        <div style="padding: 4px 16px 0; color:#888; font-size:12px; text-align:center">
          ${started ? '⚠️ Regenerating will reset all scores.' : 'Games ready. Tap Games tab to start.'}
        </div>
      ` : ''}

      <div class="page-pad"></div>
    </div>
  `;
}

function rrRenderGames() {
  if (!rrState.games.length) {
    const isPlayer = viewMode === 'player';
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>${isPlayer ? 'Waiting to start' : 'No games yet'}</h2>
          <p>${isPlayer
            ? 'The organizer is still setting up. While you wait, take a look at how the tournament works.'
            : 'Go to Setup \u2192 tap <strong>Generate Random Games</strong> to begin.'}</p>
          <button class="rr-generate-btn" style="max-width:260px;margin:20px auto;display:block" onclick="${isPlayer ? 'showRules()' : "rrSetView('setup')"}">${isPlayer ? '\ud83d\udcd6 How it works' : 'Go to Setup'}</button>
        </div>
      </div>
    `;
  }
  // Group by round (skipping done games unless rrShowDone is on)
  const mineOnly = viewMode === 'player' && typeof myIdentity === 'number';
  const inMyGame = (g) => {
    const all = (g.team1 || []).concat(g.team2 || []);
    return all.indexOf(myIdentity) !== -1;
  };
  const pool = mineOnly ? rrState.games.filter(inMyGame) : rrState.games;
  const totalDone = pool.filter(g => g.done).length;
  const total = pool.length;
  const rounds = {};
  pool.forEach((g) => {
    if (g.done && !rrShowDone) return;
    const r = g.round || 1;
    const i = rrState.games.indexOf(g);
    if (!rounds[r]) rounds[r] = [];
    rounds[r].push({ g, i });
  });
  const hasVisible = Object.keys(rounds).length > 0;
  const totalRounds = Math.max(1, ...rrState.games.map(g => g.round || 1));
  const gamesHtml = hasVisible ? Object.keys(rounds).sort((a,b)=>a-b).map(r => {
    const rNum = Number(r);
    const rGames = rounds[r];
    const allRGames = pool.filter(g => (g.round||1) === rNum);
    const done = allRGames.filter(g => g.done).length;
    const inner = rGames.map(x => rrGameCard(x.g, String(x.i), `Game ${x.i+1}`)).join('');
    const isFinal = rNum === totalRounds;
    const isPenultimate = totalRounds >= 3 && rNum === totalRounds - 1;
    const isHalfway = totalRounds >= 4 && rNum === Math.ceil(totalRounds / 2);
    let cheer = '';
    if (isFinal) cheer = 'Final round · you got this 🤜🏻';
    else if (isPenultimate) cheer = 'One more after this 💪';
    else if (isHalfway) cheer = 'Halfway there — keep it rolling';
    const cheerHtml = cheer ? `<span class="round-cheer">${cheer}</span>` : '';
    const cls = isFinal ? 'round-header final' : (isPenultimate ? 'round-header penultimate' : 'round-header');
    return `
      <div class="${cls}">Round ${rNum} · ${done}/${allRGames.length} done${cheerHtml}</div>
      ${inner}
    `;
  }).join('') : `
    <div style="padding:40px 20px;text-align:center;color:#666">
      <div style="font-size:40px;margin-bottom:10px">🎉</div>
      <div style="font-weight:700;color:#eee;font-size:15px;margin-bottom:4px">${mineOnly ? 'All your games complete' : 'All games complete'}</div>
      <div style="font-size:12px">Toggle below to see finished games.</div>
    </div>
  `;

  const filterPill = `
    <div style="padding:8px 12px 4px;display:flex;justify-content:space-between;align-items:center;gap:10px">
      <span style="color:#888;font-size:12px">${totalDone} / ${total} games complete</span>
      <button onclick="rrToggleShowDone()"
        style="background:${rrShowDone?'#1a2a3f':'#1a1a1a'};border:1px solid ${rrShowDone?'#3a5f8a':'#333'};color:${rrShowDone?'#60a5fa':'#888'};padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">
        ${rrShowDone ? '✓ Showing finished' : 'Show finished'}
      </button>
    </div>
  `;

  const subhead = mineOnly
    ? `Your games only \u00b7 ${rrShowDone ? 'all' : 'upcoming &amp; live'}`
    : (rrShowDone ? 'All games' : 'Upcoming &amp; live games only');
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Round Robin</h1>
        <p>${subhead}</p>
      </div>
      ${filterPill}
      ${gamesHtml}
      ${viewMode === 'player' ? '' : `
        <div style="padding:16px 12px;text-align:center">
          <button class="rr-generate-btn warn" style="max-width:260px;display:inline-block" onclick="rrResetAll()">↺ Reset Entire Tournament</button>
        </div>`}
      <div class="page-pad"></div>
    </div>
  `;
}

function rrRenderStandings() {
  const st = rrStandings();
  if (!st.length) return '<div class="rr-coming-soon">No players yet.</div>';

  const rrDone = rrRRComplete();
  const rows = st.map((row, i) => {
    let badgeCls = 'top8';
    if (i === 0) badgeCls = 'gold';
    else if (i === 1) badgeCls = 'silver';
    else if (i === 2) badgeCls = 'bronze';
    else if (i >= 8) badgeCls = '';
    const ppgTxt = row.gp > 0 ? row.ppg.toFixed(1) : '—';
    const diffPgTxt = row.gp > 0 ? (row.diffPg > 0 ? '+' : '') + row.diffPg.toFixed(1) : '—';
    const p = rrState.players[row.idx];
    const dropTag = p && p.dropped ? ` <span style="display:inline-block;margin-left:4px;padding:1px 5px;background:#2a2a2a;border-radius:4px;color:#f0a070;font-size:9px;font-weight:800;letter-spacing:0.5px">DROPPED</span>` : '';
    const rowStyle = p && p.dropped ? 'opacity:0.6' : '';
    return `
      <div class="rr-standings-row" style="${rowStyle}">
        <div class="rr-rank-badge ${badgeCls}">${i+1}</div>
        <div class="rr-player-name">${row.name || 'Player '+(row.idx+1)}${dropTag}</div>
        <div class="rr-stat primary">${ppgTxt}</div>
        <div class="rr-stat">${diffPgTxt}</div>
        <div class="rr-stat">${row.gw}/${row.gp}</div>
        <div class="rr-stat">${row.pf}</div>
      </div>
    `;
  }).join('');

  const counts = st.map(s => s.gp);
  const maxGp = counts.length ? Math.max(...counts) : 0;
  const minGp = counts.length ? Math.min(...counts) : 0;
  const uneven = maxGp - minGp >= 2;
  const unevenBanner = uneven ? `
    <div style="margin:10px 12px 0;padding:10px 12px;background:#1e1a00;border:1px solid #3a2f00;border-radius:8px;color:#facc15;font-size:12px;line-height:1.5">
      ⚠️ Game counts differ by ${maxGp - minGp}. Standings use per-game averages so players with fewer games aren't penalized.
    </div>` : '';

  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Individual Standings</h1>
        <p>${rrDone ? 'Round robin complete · Top 4 move to draft' : 'Ranked by avg points per game, then avg differential, then win %'}</p>
      </div>
      ${unevenBanner}
      <div class="card">
        <div class="rr-standings-row header-row">
          <span></span><span>Player</span>
          <span style="text-align:center;color:#facc15">PF/G ↓</span>
          <span style="text-align:center">+/G</span>
          <span style="text-align:center">W/G</span>
          <span style="text-align:center">PF</span>
        </div>
        <div style="padding:4px 14px 6px;font-size:10px;color:#666;letter-spacing:0.4px;text-align:right">Sort: PF/G → +/G → Win%</div>
        ${rows}
      </div>
      <div class="card-label" style="margin:16px 12px 0">Scoring</div>
      <div class="card">
        <div class="info-card">
          <div>🎯 <strong>PF/G</strong> — Avg points scored per game (primary rank). Fair when game counts differ.</div>
          <div>📊 <strong>+/G</strong> — Avg point differential per game (tiebreak 1)</div>
          <div>🏆 <strong>W/G</strong> — Wins / games played (tiebreak 2: win %)</div>
          <div>🛡️ <strong>PF</strong> — Raw total points scored (reference)</div>
          <div style="margin-top:6px;color:#facc15">Top 4 choose partners from ranks 5-8 for semis.</div>
        </div>
      </div>
      <div class="page-pad"></div>
    </div>
  `;
}

function rrRenderPlayoffs() {
  const activePlayers = rrState.players.filter(p => p && !p.dropped).length;
  if (activePlayers < 8) {
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>Playoffs unavailable</h2>
          <p>The playoff draft format needs at least <strong>8 active players</strong> (top 4 + draft pool 5-8).</p>
          <p style="margin-top:8px;color:#666">Currently ${activePlayers} active${activePlayers!==rrState.players.length?' ('+(rrState.players.length-activePlayers)+' dropped)':''}.</p>
        </div>
      </div>
    `;
  }
  if (!rrRRComplete()) {
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>Playoffs locked</h2>
          <p>Complete all ${rrState.games.length || rrTotalGames()} round-robin games to unlock draft &amp; playoffs.</p>
          <p style="margin-top:8px;color:#666">${rrState.games.filter(g=>g.done).length} / ${rrState.games.length || rrTotalGames()} done</p>
        </div>
      </div>
    `;
  }

  const st = rrActiveStandings();
  const top4 = st.slice(0, 4);
  const bottom4 = st.slice(4, 8);
  const picks = (rrState.draft && rrState.draft.picks) || {};

  // Draft UI
  let draftHtml = '';
  if (!rrDraftComplete()) {
    // Find next drafter
    let nextRank = [0,1,2,3].find(r => picks[r] == null);
    const pickedIdxs = [0,1,2,3].map(r => picks[r]).filter(v => v != null);
    const available = bottom4.filter(p => !pickedIdxs.includes(p.idx));

    const currentTeams = [0,1,2,3].map(r => {
      const top = top4[r];
      if (picks[r] != null) {
        const partner = st.find(s => s.idx === picks[r]);
        return `<div style="padding:10px 14px;border-top:1px solid #252525">
          <div style="font-size:10px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">Team ${String.fromCharCode(65+r)}</div>
          <div style="font-size:13px;color:#fff;font-weight:700">${top.name} <span style="color:#666">(${r+1})</span> + ${partner.name} <span style="color:#666">(${st.indexOf(partner)+1})</span></div>
        </div>`;
      }
      const isNext = r === nextRank;
      return `<div style="padding:10px 14px;border-top:1px solid #252525;${isNext?'background:#1e2a3f':''}">
        <div style="font-size:10px;color:${isNext?'#60a5fa':'#666'};font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">Team ${String.fromCharCode(65+r)} ${isNext?'· On the clock':''}</div>
        <div style="font-size:13px;color:#fff;font-weight:700">${top.name} <span style="color:#666">(${r+1})</span> + <span style="color:#666">?</span></div>
      </div>`;
    }).join('');

    const canPick = viewMode === 'organizer' || (typeof myIdentity === 'number' && myIdentity === top4[nextRank].idx);
    const pickerHtml = available.length === 0 ? '' : (canPick ? `
      <div class="card" style="margin-top:16px">
        <div class="card-label" style="padding:12px 14px 4px">
          ${viewMode === 'organizer' ? `Pick #${nextRank+1} \u2014 ` : ''}${top4[nextRank].name} (rank ${nextRank+1}) \u00b7 Pick partner
        </div>
        <div style="padding:0 12px 12px">
          ${available.map(p => {
            const rank = st.indexOf(p) + 1;
            return `<button onclick="rrDraftPick(${nextRank}, ${p.idx})"
              style="display:block;width:100%;margin-bottom:8px;padding:14px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;text-align:left">
              <span style="color:#60a5fa">Rank ${rank}</span> \u00b7 ${p.name}
              <span style="float:right;color:#666;font-size:12px">${p.gw}W \u00b7 ${p.diff>0?'+':''}${p.diff}</span>
            </button>`;
          }).join('')}
        </div>
      </div>
    ` : `
      <div class="card" style="margin-top:16px;padding:16px;text-align:center;color:#9ab6dd">
        \u23f3 Waiting for <strong style="color:#fff">${top4[nextRank].name}</strong> (rank ${nextRank+1}) to pick a partner\u2026
      </div>
    `);

    draftHtml = `
      <div class="card-label" style="margin:16px 12px 0">Team Draft</div>
      <div class="card">
        <div class="info-card" style="padding:12px 14px">
          Top 4 players pick partners from ranks 5-8, in order.
        </div>
        ${currentTeams}
      </div>
      ${pickerHtml}
    `;
  }

  // Bracket UI (visible once draft complete)
  let bracketHtml = '';
  if (rrDraftComplete()) {
    const semi1Html = rrState.semi1 ? rrGameCard(rrState.semi1, 'semi1', '🥈 ' + rrState.semi1.label) : '';
    const semi2Html = rrState.semi2 ? rrGameCard(rrState.semi2, 'semi2', '🥈 ' + rrState.semi2.label) : '';
    const goldHtml = rrState.gold ? rrGameCard(rrState.gold, 'gold', '🏆 ' + rrState.gold.label) :
      `<div class="rr-bracket-card">
         <div class="rr-bracket-top" style="background:#1f1c00">
           <span class="rr-bracket-label" style="color:#facc15">🏆 Gold Medal</span>
           <span class="badge badge-upcoming">Locked</span>
         </div>
         <div style="padding:16px;text-align:center;color:#666;font-size:13px">Complete both semis to unlock</div>
       </div>`;
    const bronzeHtml = rrState.bronze ? rrGameCard(rrState.bronze, 'bronze', '🥉 ' + rrState.bronze.label) :
      `<div class="rr-bracket-card">
         <div class="rr-bracket-top" style="background:#1a1400">
           <span class="rr-bracket-label" style="color:#cd7f32">🥉 Bronze Medal</span>
           <span class="badge badge-upcoming">Locked</span>
         </div>
         <div style="padding:16px;text-align:center;color:#666;font-size:13px">Complete both semis to unlock</div>
       </div>`;

    bracketHtml = `
      <div class="rr-subsection-label">Semifinals</div>
      ${semi1Html}
      ${semi2Html}
      <div class="rr-subsection-label">Medal Matches</div>
      ${goldHtml}
      ${bronzeHtml}
      <div style="padding:12px 12px 0;text-align:center">
        <button class="reset-btn" style="font-size:11px" onclick="rrUndoDraft()">↺ Redo Draft</button>
      </div>
    `;
  }

  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Playoffs</h1>
        <p>${rrDraftComplete() ? 'Bracket locked in' : 'Draft your partner'}</p>
      </div>
      ${draftHtml}
      ${bracketHtml}
      <div class="page-pad"></div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// PPA (Fixed Partner Teams) — round robin with optional pools
// ═══════════════════════════════════════════════
function ppaMigrate(s) {
  s.name = s.name || 'PPA Tournament';
  s.teams = (s.teams || []).map(t => ({ name: t.name || '', p1: t.p1 || '', p2: t.p2 || '' }));
  s.pools = Math.max(1, s.pools || 1);
  s.numCourts = Math.max(1, s.numCourts || 2);
  s.games = (s.games || []).map(g => ({
    i: g.i|0, court: g.court|0 || 1, round: g.round|0 || 1, pool: g.pool|0,
    t1: g.t1|0, t2: g.t2|0, s1: g.s1|0, s2: g.s2|0,
    done: !!g.done, winner: g.winner || null,
  }));
  s.semi1 = s.semi1 || null;
  s.semi2 = s.semi2 || null;
  s.gold = s.gold || null;
  s.bronze = s.bronze || null;
  return s;
}
function loadPPAState() {
  try {
    const s = JSON.parse(localStorage.getItem('ppa_v1'));
    if (s && Array.isArray(s.teams)) return ppaMigrate(s);
  } catch(_) {}
  return {
    name: 'PPA Tournament',
    teams: [
      { name: '', p1: 'Player 1', p2: 'Player 2' },
      { name: '', p1: 'Player 3', p2: 'Player 4' },
      { name: '', p1: 'Player 5', p2: 'Player 6' },
      { name: '', p1: 'Player 7', p2: 'Player 8' },
    ],
    pools: 1,
    numCourts: 2,
    games: [],
    semi1: null,
    semi2: null,
    gold: null,
    bronze: null,
  };
}
let ppaState = loadPPAState();
let ppaView = localStorage.getItem('ppa_view') || 'setup';
let ppaSaveTimer = null;
let ppaLocalWrite = false;
let ppaSyncSource = null;

function ppaSave() {
  localStorage.setItem('ppa_v1', JSON.stringify(ppaState));
  if (!FIREBASE_URL) return;
  clearTimeout(ppaSaveTimer);
  ppaSaveTimer = setTimeout(() => {
    ppaLocalWrite = true;
    fetch(FIREBASE_URL + '/ppa_state.json', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(ppaState)
    }).catch(()=>{ ppaLocalWrite = false; });
  }, 150);
}
function ppaInitSync() {
  if (ppaSyncSource) { ppaSyncSource.close(); ppaSyncSource = null; }
  if (!FIREBASE_URL) return;
  ppaSyncSource = new EventSource(FIREBASE_URL + '/ppa_state.json');
  ppaSyncSource.addEventListener('put', e => {
    try {
      const payload = JSON.parse(e.data);
      if (payload.data) {
        if (ppaLocalWrite) { ppaLocalWrite = false; return; }
        ppaState = ppaMigrate(payload.data);
        localStorage.setItem('ppa_v1', JSON.stringify(ppaState));
        if (tournamentMode === 'ppa') render();
      } else if (payload.path === '/' && payload.data === null) {
        ppaSave();
      }
    } catch(_) {}
  });
}
function ppaSetView(v) { ppaView = v; localStorage.setItem('ppa_view', v); render(); }
function ppaTeam(i) { return ppaState.teams[i] || null; }
function ppaTeamShort(i) {
  const t = ppaTeam(i);
  if (!t) return '?';
  if (t.name) return escapeHtml(t.name);
  return escapeHtml((t.p1 || 'P1') + ' & ' + (t.p2 || 'P2'));
}
function ppaTeamPlayers(i) {
  const t = ppaTeam(i);
  if (!t) return '';
  return escapeHtml((t.p1 || 'P1') + ' & ' + (t.p2 || 'P2'));
}
function ppaAddTeam() {
  const n = ppaState.teams.length + 1;
  ppaState.teams.push({ name: '', p1: 'Player ' + (n*2-1), p2: 'Player ' + (n*2) });
  if (ppaState.games.length) {
    ppaState.games = [];
    ppaState.semi1 = null; ppaState.semi2 = null;
    ppaState.gold = null; ppaState.bronze = null;
  }
  ppaSave(); render();
}
function ppaRemoveTeam(idx) {
  if (ppaState.teams.length <= 2) { alert('Need at least 2 teams.'); return; }
  if (ppaState.games.length && !confirm('Removing a team will clear the schedule. Continue?')) return;
  ppaState.teams.splice(idx, 1);
  ppaState.games = [];
  ppaState.semi1 = null; ppaState.semi2 = null;
  ppaState.gold = null; ppaState.bronze = null;
  ppaSave(); render();
}
function ppaUpdateTeam(idx, field, value) {
  const t = ppaState.teams[idx];
  if (!t) return;
  t[field] = value;
  ppaSave();
}
function ppaUpdateConfig(key, value) {
  const n = Math.max(1, parseInt(value) || 1);
  if (key === 'pools') {
    const next = Math.min(4, n);
    if (next !== ppaState.pools && (ppaState.semi1 || ppaState.semi2 || ppaState.gold || ppaState.bronze)) {
      ppaState.semi1 = null; ppaState.semi2 = null;
      ppaState.gold = null; ppaState.bronze = null;
    }
    ppaState.pools = next;
  }
  else if (key === 'numCourts') ppaState.numCourts = n;
  ppaSave(); render();
}
function ppaUpdateName(name) { ppaState.name = String(name || '').slice(0, 60); ppaSave(); }
function ppaGetGame(key) {
  if (key === 'semi1') return ppaState.semi1;
  if (key === 'semi2') return ppaState.semi2;
  if (key === 'gold') return ppaState.gold;
  if (key === 'bronze') return ppaState.bronze;
  return ppaState.games[parseInt(key)] || null;
}
function ppaAdj(key, team, delta) {
  const g = ppaGetGame(key); if (!g || g.done) return;
  if (team === 1) {
    const clamped = clampPickleScore(g.s1 + delta, g.s2);
    if (delta > 0 && clamped === g.s1) { toast('Win by 2 \u2014 max ' + clamped + '.', 1200); return; }
    g.s1 = clamped;
  } else {
    const clamped = clampPickleScore(g.s2 + delta, g.s1);
    if (delta > 0 && clamped === g.s2) { toast('Win by 2 \u2014 max ' + clamped + '.', 1200); return; }
    g.s2 = clamped;
  }
  ppaSave(); render();
}
function ppaSetScoreInline(key, team, value) {
  const g = ppaGetGame(key); if (!g || g.done) return;
  const n = Math.max(0, parseInt(value) || 0);
  if (team === 1) g.s1 = clampPickleScore(n, g.s2);
  else g.s2 = clampPickleScore(n, g.s1);
  ppaSave(); render();
}
function ppaMarkDone(key) {
  const g = ppaGetGame(key); if (!g) return;
  if (g.s1 === g.s2) { alert("Scores tied — can't complete."); return; }
  const hi = Math.max(g.s1, g.s2);
  const margin = Math.abs(g.s1 - g.s2);
  if (hi < 11 || margin < 2) {
    if (!confirm(`Unusual score ${g.s1}–${g.s2} (rules: 11, win by 2). Submit anyway?`)) return;
  }
  g.done = true;
  g.winner = g.s1 > g.s2 ? 't1' : 't2';
  launchConfetti();
  if (key === 'semi1' || key === 'semi2') ppaMaybeAdvancePlayoffs();
  ppaSave(); render();
}
function ppaUndoGame(key) {
  const g = ppaGetGame(key); if (!g) return;
  g.done = false; g.winner = null;
  if (key === 'semi1' || key === 'semi2') {
    ppaState.gold = null; ppaState.bronze = null;
  }
  ppaSave(); render();
}
function ppaResetGame(key) {
  const g = ppaGetGame(key); if (!g) return;
  if (!confirm('Reset this game\u2019s score?')) return;
  g.s1 = 0; g.s2 = 0; g.done = false; g.winner = null;
  if (key === 'semi1' || key === 'semi2') {
    ppaState.gold = null; ppaState.bronze = null;
  }
  ppaSave(); render();
}
function ppaResetAll() {
  if (!confirm('Reset the whole PPA tournament? All scores will be cleared.')) return;
  ppaState.games.forEach(g => { g.s1 = 0; g.s2 = 0; g.done = false; g.winner = null; });
  ppaState.semi1 = null; ppaState.semi2 = null;
  ppaState.gold = null; ppaState.bronze = null;
  ppaSave(); render();
}
function ppaRRComplete() {
  return ppaState.games.length > 0 && ppaState.games.every(g => g.done);
}
function ppaPlayoffsSupported() {
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, ppaState.teams.length));
  if (poolCount === 1) return ppaState.teams.length >= 4;
  if (poolCount === 2) return ppaState.teams.length >= 4;
  return false;
}
function ppaBuildPlayoffs() {
  if (!ppaRRComplete() || !ppaPlayoffsSupported()) return;
  const byPool = ppaStandings();
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, ppaState.teams.length));
  if (poolCount === 1) {
    const st = byPool[0] || [];
    if (st.length < 4) return;
    ppaState.semi1 = { court: 1, t1: st[0].idx, t2: st[3].idx, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 1 \u00b7 1 vs 4' };
    ppaState.semi2 = { court: 2, t1: st[1].idx, t2: st[2].idx, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 2 \u00b7 2 vs 3' };
  } else {
    const a = byPool[0] || [], b = byPool[1] || [];
    if (a.length < 2 || b.length < 2) return;
    ppaState.semi1 = { court: 1, t1: a[0].idx, t2: b[1].idx, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 1 \u00b7 A1 vs B2' };
    ppaState.semi2 = { court: 2, t1: b[0].idx, t2: a[1].idx, s1: 0, s2: 0, done: false, winner: null, label: 'Semi 2 \u00b7 B1 vs A2' };
  }
  ppaState.gold = null;
  ppaState.bronze = null;
}
function ppaMaybeAdvancePlayoffs() {
  const s1 = ppaState.semi1, s2 = ppaState.semi2;
  if (s1 && s1.done && s2 && s2.done) {
    const s1W = s1.winner === 't1' ? s1.t1 : s1.t2;
    const s1L = s1.winner === 't1' ? s1.t2 : s1.t1;
    const s2W = s2.winner === 't1' ? s2.t1 : s2.t2;
    const s2L = s2.winner === 't1' ? s2.t2 : s2.t1;
    if (!ppaState.gold)   ppaState.gold   = { court: 1, t1: s1W, t2: s2W, s1: 0, s2: 0, done: false, winner: null, label: 'Gold Medal' };
    if (!ppaState.bronze) ppaState.bronze = { court: 2, t1: s1L, t2: s2L, s1: 0, s2: 0, done: false, winner: null, label: 'Bronze Medal' };
  }
}
function ppaResetPlayoffs() {
  if (!confirm('Reset playoff bracket? Semi and medal scores will be cleared.')) return;
  ppaState.semi1 = null; ppaState.semi2 = null;
  ppaState.gold = null; ppaState.bronze = null;
  ppaSave(); render();
}

function ppaAssignPools() {
  const n = ppaState.teams.length;
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, n));
  const assignment = new Array(n);
  for (let i = 0; i < n; i++) assignment[i] = i % poolCount;
  return assignment;
}
function ppaGenerateAll() {
  const n = ppaState.teams.length;
  if (n < 2) { alert('Need at least 2 teams.'); return; }
  if (ppaState.games.some(g => g.done || g.s1>0 || g.s2>0)) {
    if (!confirm('This will overwrite all current games and scores. Continue?')) return;
  }
  const teamPool = ppaAssignPools();
  const matchups = [];
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      if (teamPool[i] === teamPool[j]) matchups.push({ t1: i, t2: j, pool: teamPool[i] });
    }
  }
  for (let k = matchups.length - 1; k > 0; k--) {
    const r = Math.floor(Math.random() * (k + 1));
    [matchups[k], matchups[r]] = [matchups[r], matchups[k]];
  }
  const rounds = [];
  for (const m of matchups) {
    let placed = false;
    for (const round of rounds) {
      if (round.length >= ppaState.numCourts) continue;
      if (round.some(g => g.t1 === m.t1 || g.t2 === m.t1 || g.t1 === m.t2 || g.t2 === m.t2)) continue;
      round.push(m);
      placed = true;
      break;
    }
    if (!placed) rounds.push([m]);
  }
  const games = [];
  let gi = 0;
  rounds.forEach((round, r) => {
    round.forEach((m, c) => {
      games.push({
        i: gi++, court: c + 1, round: r + 1, pool: m.pool,
        t1: m.t1, t2: m.t2,
        s1: 0, s2: 0, done: false, winner: null,
      });
    });
  });
  ppaState.games = games;
  ppaState.semi1 = null; ppaState.semi2 = null;
  ppaState.gold = null; ppaState.bronze = null;
  ppaSave();
  ppaSetView('games');
}
function ppaStandings() {
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, ppaState.teams.length));
  const rows = ppaState.teams.map((_, idx) => ({
    idx, name: ppaTeamShort(idx), pool: idx % poolCount,
    pf: 0, pa: 0, gp: 0, gw: 0,
  }));
  ppaState.games.forEach(g => {
    if (!g.done) return;
    const a = rows[g.t1], b = rows[g.t2];
    if (a) { a.pf += g.s1; a.pa += g.s2; a.gp++; if (g.winner === 't1') a.gw++; }
    if (b) { b.pf += g.s2; b.pa += g.s1; b.gp++; if (g.winner === 't2') b.gw++; }
  });
  rows.forEach(r => r.diff = r.pf - r.pa);
  const byPool = {};
  for (let p = 0; p < poolCount; p++) byPool[p] = [];
  rows.forEach(r => { if (byPool[r.pool]) byPool[r.pool].push(r); });
  Object.keys(byPool).forEach(p => {
    byPool[p].sort((a, b) => b.pf - a.pf || b.diff - a.diff || b.gw - a.gw);
  });
  return byPool;
}
function ppaPoolLabel(p) { return ppaState.pools > 1 ? `Pool ${String.fromCharCode(65 + p)}` : ''; }

function ppaGameCard(g, key, title) {
  let badge, badgeClass;
  if (g.done) { badge='Final'; badgeClass='badge-done'; }
  else if (g.s1>0 || g.s2>0) { badge='Live'; badgeClass='badge-live'; }
  else { badge='Upcoming'; badgeClass='badge-upcoming'; }
  const w1 = g.done && g.winner === 't1';
  const w2 = g.done && g.winner === 't2';
  let scoreHtml;
  if (g.done) {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side" style="justify-content:center"><div class="score-num-big" style="color:${w1?'#60a5fa':'#fff'}">${g.s1}</div></div>
        <div class="score-sep">–</div>
        <div class="score-side right" style="justify-content:center"><div class="score-num-big" style="color:${w2?'#f472b6':'#fff'}">${g.s2}</div></div>
      </div>
      <div style="text-align:center;margin-top:4px"><button class="undo-btn" onclick="ppaUndoGame('${key}')">Undo</button></div>`;
  } else {
    scoreHtml = `
      <div class="score-row">
        <div class="score-side">
          <button class="score-tap" onclick="ppaAdj('${key}',1,1)" style="color:#60a5fa">+</button>
          <input class="score-num-big" type="number" min="0" value="${g.s1}"
            data-focus-key="ppa-${key}-1"
            onchange="ppaSetScoreInline('${key}',1,this.value)"
            onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
            style="color:#60a5fa"/>
          <button class="score-tap minus" onclick="ppaAdj('${key}',1,-1)">−</button>
        </div>
        <div class="score-sep">–</div>
        <div class="score-side right">
          <button class="score-tap minus" onclick="ppaAdj('${key}',2,-1)">−</button>
          <input class="score-num-big" type="number" min="0" value="${g.s2}"
            data-focus-key="ppa-${key}-2"
            onchange="ppaSetScoreInline('${key}',2,this.value)"
            onfocus="this.select()" inputmode="numeric" pattern="[0-9]*"
            style="color:#f472b6"/>
          <button class="score-tap" onclick="ppaAdj('${key}',2,1)" style="color:#f472b6">+</button>
        </div>
      </div>
      <button class="done-btn" onclick="ppaMarkDone('${key}')">Mark Game Done ✓</button>`;
  }
  const t1Name = ppaTeamShort(g.t1);
  const t2Name = ppaTeamShort(g.t2);
  const t1Sub = ppaTeam(g.t1) && ppaTeam(g.t1).name ? `<div style="font-size:11px;color:#888;margin-top:2px">${ppaTeamPlayers(g.t1)}</div>` : '';
  const t2Sub = ppaTeam(g.t2) && ppaTeam(g.t2).name ? `<div style="font-size:11px;color:#888;margin-top:2px;text-align:right">${ppaTeamPlayers(g.t2)}</div>` : '';
  let resultHtml = '';
  if (g.done) {
    const winName = g.winner === 't1' ? t1Name : t2Name;
    resultHtml = `<div class="result-banner" style="background:#0f2a0f;color:#4ade80">${winName} wins!</div>`;
  }
  return `
    <div class="rr-round-card" ${!g.done && (g.s1>0||g.s2>0)?'id="active-match"':''}>
      <div class="rr-round-top">
        <span style="display:flex;align-items:center;gap:8px;min-width:0">
          ${rrCourtPillHtml(g.court)}
          <span class="rr-round-title">${title}</span>
        </span>
        <span class="badge ${badgeClass}">${badge}</span>
      </div>
      <div class="rr-game-card${g.done?' complete':''}">
        <div class="rr-team-row">
          <div class="rr-team-names t1">${t1Name}${t1Sub}</div>
          <div class="rr-vs">vs</div>
          <div class="rr-team-names t2 right">${t2Name}${t2Sub}</div>
        </div>
        ${scoreHtml}
      </div>
      ${resultHtml}
      <div class="reset-row"><button class="reset-btn" onclick="ppaResetGame('${key}')">↺ Reset</button></div>
    </div>`;
}

function ppaRenderSetup() {
  const teamRows = ppaState.teams.map((t, i) => `
    <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:10px;margin:0 12px 8px;display:grid;grid-template-columns:28px 1fr 32px;gap:8px;align-items:center">
      <div style="color:#666;font-weight:800;text-align:center">${i+1}</div>
      <div style="display:flex;flex-direction:column;gap:6px;min-width:0">
        <input class="rr-player-input" placeholder="Team name (optional)"
          value="${escapeHtml(t.name||'')}"
          data-focus-key="ppa-tname-${i}"
          oninput="ppaUpdateTeam(${i},'name',this.value)"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <input class="rr-player-input" placeholder="Player 1"
            value="${escapeHtml(t.p1||'')}"
            data-focus-key="ppa-tp1-${i}"
            oninput="ppaUpdateTeam(${i},'p1',this.value)"/>
          <input class="rr-player-input" placeholder="Player 2"
            value="${escapeHtml(t.p2||'')}"
            data-focus-key="ppa-tp2-${i}"
            oninput="ppaUpdateTeam(${i},'p2',this.value)"/>
        </div>
      </div>
      ${ppaState.teams.length > 2
        ? `<button onclick="ppaRemoveTeam(${i})" style="width:32px;height:32px;background:#2a2a2a;border:none;border-radius:8px;color:#666;font-size:16px;cursor:pointer">×</button>`
        : '<div></div>'}
    </div>`).join('');
  const hasGames = ppaState.games.length > 0;
  const started = ppaState.games.some(g => g.done || g.s1>0 || g.s2>0);
  const n = ppaState.teams.length;
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, ppaState.teams.length));
  let totalGames = 0;
  {
    const assn = ppaAssignPools();
    for (let i = 0; i < n; i++) for (let j = i+1; j < n; j++) if (assn[i] === assn[j]) totalGames++;
  }
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>PPA Setup</h1>
        <p>${n} teams · ${poolCount} pool${poolCount>1?'s':''} · ${totalGames} total games</p>
      </div>
      <div class="rr-subsection-label">Teams · ${n}</div>
      ${teamRows}
      <div style="padding:0 12px">
        <button onclick="ppaAddTeam()" style="width:100%;margin-top:4px;padding:10px;background:#1e1e1e;border:1px dashed #333;border-radius:9px;color:#888;font-size:13px;font-weight:700;cursor:pointer">+ Add Team</button>
      </div>
      <div class="rr-subsection-label">Configuration</div>
      <div style="padding: 0 12px">
        <div class="rr-config-grid">
          <div class="rr-config-item">
            <div class="rr-config-label">Pools</div>
            <input class="rr-config-input" type="number" min="1" max="4"
              value="${poolCount}" onchange="ppaUpdateConfig('pools', this.value)"/>
          </div>
          <div class="rr-config-item">
            <div class="rr-config-label">Courts</div>
            <input class="rr-config-input" type="number" min="1"
              value="${ppaState.numCourts}" onchange="ppaUpdateConfig('numCourts', this.value)"/>
          </div>
        </div>
        <div style="color:#666;font-size:12px;margin:10px 4px;line-height:1.5">
          ${poolCount === 1
            ? `Single pool: all ${n} teams play each other once \u2192 <strong style="color:#ccc">${totalGames}</strong> games.`
            : `${poolCount} pools of ${Math.ceil(n/poolCount)}–${Math.floor(n/poolCount)} teams, round-robin within each pool.`}
        </div>
      </div>
      <button class="rr-generate-btn" onclick="ppaGenerateAll()">
        ${hasGames ? '🎲 Regenerate Schedule' : '🎲 Generate Schedule'}
      </button>
      ${hasGames ? `
        <div style="padding: 4px 16px 0; color:#888; font-size:12px; text-align:center">
          ${started ? '⚠️ Regenerating will reset all scores.' : 'Games ready. Tap Games tab to start.'}
        </div>` : ''}
      <div class="page-pad"></div>
    </div>`;
}

function ppaRenderGames() {
  if (!ppaState.games.length) {
    const isPlayer = viewMode === 'player';
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>${isPlayer ? 'Waiting to start' : 'No games yet'}</h2>
          <p>${isPlayer
            ? 'The organizer is still setting up. While you wait, take a look at how the tournament works.'
            : 'Go to Setup \u2192 tap <strong>Generate Schedule</strong> to begin.'}</p>
          <button class="rr-generate-btn" style="max-width:260px;margin:20px auto;display:block" onclick="${isPlayer ? 'showRules()' : "ppaSetView('setup')"}">${isPlayer ? '\ud83d\udcd6 How it works' : 'Go to Setup'}</button>
        </div>
      </div>`;
  }
  const totalDone = ppaState.games.filter(g => g.done).length;
  const total = ppaState.games.length;
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, ppaState.teams.length));
  const byPool = {};
  ppaState.games.forEach(g => {
    if (g.done && !rrShowDone) return;
    if (!byPool[g.pool]) byPool[g.pool] = {};
    if (!byPool[g.pool][g.round]) byPool[g.pool][g.round] = [];
    byPool[g.pool][g.round].push(g);
  });
  const totalRounds = Math.max(1, ...ppaState.games.map(g => g.round||1));
  const poolKeys = Object.keys(byPool).sort((a,b)=>a-b);
  const hasVisible = poolKeys.length > 0;
  const gamesHtml = hasVisible ? poolKeys.map(poolIdx => {
    const rounds = byPool[poolIdx];
    const poolLabel = ppaPoolLabel(Number(poolIdx));
    const poolHeader = poolLabel ? `<div style="padding:18px 16px 0;font-size:13px;font-weight:800;color:#facc15;letter-spacing:0.5px">${poolLabel}</div>` : '';
    const roundKeys = Object.keys(rounds).sort((a,b)=>a-b);
    const roundsHtml = roundKeys.map(r => {
      const rNum = Number(r);
      const rGames = rounds[r];
      const allRGames = ppaState.games.filter(g => g.pool === Number(poolIdx) && (g.round||1) === rNum);
      const done = allRGames.filter(g => g.done).length;
      const isFinal = rNum === totalRounds;
      const isPenultimate = totalRounds >= 3 && rNum === totalRounds - 1;
      const isHalfway = totalRounds >= 4 && rNum === Math.ceil(totalRounds / 2);
      let cheer = '';
      if (isFinal) cheer = 'Final round · you got this 🤜🏻';
      else if (isPenultimate) cheer = 'One more after this 💪';
      else if (isHalfway) cheer = 'Halfway there — keep it rolling';
      const cheerHtml = cheer ? `<span class="round-cheer">${cheer}</span>` : '';
      const cls = isFinal ? 'round-header final' : (isPenultimate ? 'round-header penultimate' : 'round-header');
      const inner = rGames.map(g => ppaGameCard(g, String(g.i), 'Game ' + (g.i+1))).join('');
      return `<div class="${cls}">Round ${rNum} · ${done}/${allRGames.length} done${cheerHtml}</div>${inner}`;
    }).join('');
    return poolHeader + roundsHtml;
  }).join('') : `
    <div style="padding:40px 20px;text-align:center;color:#666">
      <div style="font-size:40px;margin-bottom:10px">🎉</div>
      <div style="font-weight:700;color:#eee;font-size:15px;margin-bottom:4px">All games complete</div>
      <div style="font-size:12px">Toggle below to see finished games.</div>
    </div>`;
  const filterPill = `
    <div style="padding:8px 12px 4px;display:flex;justify-content:space-between;align-items:center;gap:10px">
      <span style="color:#888;font-size:12px">${totalDone} / ${total} games complete</span>
      <button onclick="rrToggleShowDone()"
        style="background:${rrShowDone?'#1a2a3f':'#1a1a1a'};border:1px solid ${rrShowDone?'#3a5f8a':'#333'};color:${rrShowDone?'#60a5fa':'#888'};padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer">
        ${rrShowDone ? '✓ Showing finished' : 'Show finished'}
      </button>
    </div>`;
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>${escapeHtml(ppaState.name || 'PPA Tournament')}</h1>
        <p>${poolCount > 1 ? poolCount+' pools · ' : ''}${rrShowDone ? 'All games' : 'Upcoming &amp; live games only'}</p>
      </div>
      ${filterPill}
      ${gamesHtml}
      ${viewMode === 'player' ? '' : `
        <div style="padding:16px 12px;text-align:center">
          <button class="rr-generate-btn warn" style="max-width:260px;display:inline-block" onclick="ppaResetAll()">↺ Reset Entire Tournament</button>
        </div>`}
      <div class="page-pad"></div>
    </div>`;
}

function ppaRenderStandings() {
  const byPool = ppaStandings();
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, ppaState.teams.length));
  const poolKeys = Object.keys(byPool).sort((a,b)=>a-b);
  const tables = poolKeys.map(p => {
    const rows = byPool[p].map((row, i) => {
      let badgeCls = 'top8';
      if (i === 0) badgeCls = 'gold';
      else if (i === 1) badgeCls = 'silver';
      else if (i === 2) badgeCls = 'bronze';
      return `
        <div class="rr-standings-row">
          <div class="rr-rank-badge ${badgeCls}">${i+1}</div>
          <div class="rr-player-name">${row.name}</div>
          <div class="rr-stat primary">${row.pf}</div>
          <div class="rr-stat">${row.diff>0?'+':''}${row.diff}</div>
          <div class="rr-stat">${row.gw}/${row.gp}</div>
          <div class="rr-stat">${row.pa}</div>
        </div>`;
    }).join('');
    const label = poolCount > 1 ? `<div class="rr-subsection-label">${ppaPoolLabel(Number(p))}</div>` : '';
    return `
      ${label}
      <div class="card">
        <div class="rr-standings-row header-row">
          <span></span><span>Team</span>
          <span style="text-align:center;color:#facc15">PF ↓</span>
          <span style="text-align:center">+/−</span>
          <span style="text-align:center">W/G</span>
          <span style="text-align:center">PA</span>
        </div>
        ${rows || '<div style="padding:14px;color:#666;font-size:12px">No teams in pool.</div>'}
      </div>`;
  }).join('');
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Team Standings</h1>
        <p>${poolCount > 1 ? 'Pool standings · sorted by Points For' : 'Sorted by points scored, then differential, then wins'}</p>
      </div>
      ${tables}
      <div class="card-label" style="margin:16px 12px 0">Scoring</div>
      <div class="card">
        <div class="info-card">
          <div>🎯 <strong>PF</strong> — Points scored (primary rank)</div>
          <div>📊 <strong>+/−</strong> — Point differential (tiebreak 1)</div>
          <div>🏆 <strong>W/G</strong> — Wins / games played (tiebreak 2)</div>
          <div>🛡️ <strong>PA</strong> — Points against you</div>
        </div>
      </div>
      <div class="page-pad"></div>
    </div>`;
}

function ppaRenderPlayoffs() {
  const poolCount = Math.max(1, Math.min(ppaState.pools || 1, ppaState.teams.length));
  if (!ppaPlayoffsSupported()) {
    const reason = poolCount > 2
      ? `Auto-bracket supports <strong>1 or 2 pools</strong>. You have ${poolCount}.`
      : `Need at least <strong>4 teams</strong> to run a medal bracket.`;
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>Playoffs unavailable</h2>
          <p>${reason}</p>
        </div>
      </div>`;
  }
  if (!ppaRRComplete()) {
    const total = ppaState.games.length;
    const done = ppaState.games.filter(g => g.done).length;
    return `
      <div class="rr-page">
        <div class="rr-coming-soon">
          <h2>Playoffs locked</h2>
          <p>Complete all round-robin games to unlock semifinals &amp; medals.</p>
          <p style="margin-top:8px;color:#666">${done} / ${total || '\u2014'} done</p>
        </div>
      </div>`;
  }
  if (!ppaState.semi1 || !ppaState.semi2) {
    ppaBuildPlayoffs();
    ppaSave();
  }
  const byPool = ppaStandings();
  let seedHtml = '';
  if (poolCount === 1) {
    const st = byPool[0] || [];
    const rows = st.slice(0, 4).map((r, i) => `
      <div style="padding:8px 14px;border-top:1px solid #252525;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:#fff;font-weight:700">${i+1}. ${r.name}</span>
        <span style="color:#666;font-size:12px">${r.pf} PF \u00b7 ${r.gw}W</span>
      </div>`).join('');
    seedHtml = `
      <div class="card-label" style="margin:16px 12px 0">Seeds</div>
      <div class="card">
        <div class="info-card" style="padding:12px 14px">Top 4 by PF \u2192 1v4, 2v3.</div>
        ${rows}
      </div>`;
  } else {
    const a = byPool[0] || [], b = byPool[1] || [];
    const row = (r, lbl) => `
      <div style="padding:8px 14px;border-top:1px solid #252525;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:#fff;font-weight:700">${lbl}. ${r.name}</span>
        <span style="color:#666;font-size:12px">${r.pf} PF \u00b7 ${r.gw}W</span>
      </div>`;
    seedHtml = `
      <div class="card-label" style="margin:16px 12px 0">Seeds</div>
      <div class="card">
        <div class="info-card" style="padding:12px 14px">Top 2 per pool \u2192 A1 vs B2, B1 vs A2.</div>
        ${a[0] ? row(a[0], 'A1') : ''}
        ${a[1] ? row(a[1], 'A2') : ''}
        ${b[0] ? row(b[0], 'B1') : ''}
        ${b[1] ? row(b[1], 'B2') : ''}
      </div>`;
  }
  const semi1Html = ppaState.semi1 ? ppaGameCard(ppaState.semi1, 'semi1', '\ud83e\udd48 ' + ppaState.semi1.label) : '';
  const semi2Html = ppaState.semi2 ? ppaGameCard(ppaState.semi2, 'semi2', '\ud83e\udd48 ' + ppaState.semi2.label) : '';
  const goldHtml = ppaState.gold ? ppaGameCard(ppaState.gold, 'gold', '\ud83c\udfc6 ' + ppaState.gold.label) :
    `<div class="rr-round-card">
       <div class="rr-round-top" style="background:#1f1c00">
         <span class="rr-round-title" style="color:#facc15">\ud83c\udfc6 Gold Medal</span>
         <span class="badge badge-upcoming">Locked</span>
       </div>
       <div style="padding:16px;text-align:center;color:#666;font-size:13px">Complete both semis to unlock</div>
     </div>`;
  const bronzeHtml = ppaState.bronze ? ppaGameCard(ppaState.bronze, 'bronze', '\ud83e\udd49 ' + ppaState.bronze.label) :
    `<div class="rr-round-card">
       <div class="rr-round-top" style="background:#1a1400">
         <span class="rr-round-title" style="color:#cd7f32">\ud83e\udd49 Bronze Medal</span>
         <span class="badge badge-upcoming">Locked</span>
       </div>
       <div style="padding:16px;text-align:center;color:#666;font-size:13px">Complete both semis to unlock</div>
     </div>`;
  const resetBtn = viewMode === 'player' ? '' : `
    <div style="padding:16px 12px;text-align:center">
      <button class="reset-btn" style="font-size:11px" onclick="ppaResetPlayoffs()">\u21ba Reset Playoffs</button>
    </div>`;
  return `
    <div class="rr-page">
      <div class="rr-header">
        <h1>Playoffs</h1>
        <p>${poolCount === 1 ? 'Top 4 seeds \u00b7 single elimination' : 'Cross-bracket \u00b7 top 2 per pool'}</p>
      </div>
      ${seedHtml}
      <div class="rr-subsection-label">Semifinals</div>
      ${semi1Html}
      ${semi2Html}
      <div class="rr-subsection-label">Medal Matches</div>
      ${goldHtml}
      ${bronzeHtml}
      ${resetBtn}
      <div class="page-pad"></div>
    </div>`;
}

function renderPPA() {
  const isPlayer = viewMode === 'player';
  if (isPlayer && ppaView === 'setup') ppaView = 'games';
  const ppaDone = ppaRRComplete();
  const setupBtn = isPlayer ? '' :
    `<button onclick="ppaSetView('setup')" class="${ppaView==='setup'?'active':''}">Setup</button>`;
  const playoffBtn = ppaPlayoffsSupported()
    ? `<button onclick="ppaSetView('playoffs')"  class="${ppaView==='playoffs'?'active':''}" style="${ppaDone?'':'opacity:0.6'}">Playoffs</button>`
    : '';
  const nav = `
    <nav class="nav">
      ${setupBtn}
      <button onclick="ppaSetView('games')"     class="${ppaView==='games'?'active':''}">Games</button>
      <button onclick="ppaSetView('standings')" class="${ppaView==='standings'?'active':''}">Standings</button>
      ${playoffBtn}
    </nav>
    <div class="sync-bar sync-pending" id="sync-status-bar"></div>`;
  let body;
  if (ppaView === 'setup') body = ppaRenderSetup();
  else if (ppaView === 'playoffs') body = ppaRenderPlayoffs();
  else if (ppaView === 'standings') body = ppaRenderStandings();
  else body = ppaRenderGames();
  swapApp(nav + body);
}

function renderRR() {
  const rrDone = rrRRComplete();
  const isPlayer = viewMode === 'player';
  if (isPlayer && rrView === 'setup') rrView = 'games';
  const setupBtn = isPlayer ? '' :
    `<button onclick="rrSetView('setup')" class="${rrView==='setup'?'active':''}">Setup</button>`;
  const nav = `
    <nav class="nav">
      ${setupBtn}
      <button onclick="rrSetView('games')"     class="${rrView==='games'?'active':''}">Games</button>
      <button onclick="rrSetView('standings')" class="${rrView==='standings'?'active':''}">Standings</button>
      <button onclick="rrSetView('playoffs')"  class="${rrView==='playoffs'?'active':''}" style="${rrDone?'':'opacity:0.6'}">Playoffs</button>
    </nav>
    <div class="sync-bar sync-pending" id="sync-status-bar"></div>
  `;
  let body;
  if (rrView === 'setup') body = rrRenderSetup();
  else if (rrView === 'games') body = rrMyCard() + rrRenderGames();
  else if (rrView === 'standings') body = rrMyCard() + rrRenderStandings();
  else if (rrView === 'playoffs') body = rrRenderPlayoffs();
  else body = rrRenderSetup();

  swapApp(nav + body);
}

window.addEventListener('error', (e) => {
  const app = document.getElementById('app');
  if (app && !app.innerHTML) {
    app.innerHTML = `<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;line-height:1.6">
      <strong style="color:#fff;font-size:14px">Error loading app</strong><br><br>
      ${(e.message||'').replace(/</g,'&lt;')}<br>
      <span style="color:#888">${(e.filename||'').replace(/</g,'&lt;')}:${e.lineno||''}:${e.colno||''}</span>
    </div>`;
  }
});

try {
  render();
  initSync();
  rrInitSync();
  ppaInitSync();
  if (tournamentMode === 'rr' && localStorage.getItem('welcomed') !== '1') showWelcome();
} catch (err) {
  document.getElementById('app').innerHTML = `<div style="padding:20px;color:#f87171;font-family:monospace;font-size:12px;line-height:1.6">
    <strong style="color:#fff;font-size:14px">Startup error</strong><br><br>
    ${(err.message||'').replace(/</g,'&lt;')}<br><br>
    <pre style="color:#888;white-space:pre-wrap;font-size:11px">${(err.stack||'').replace(/</g,'&lt;')}</pre>
  </div>`;
}

// Inject the floating rules button once. Pulses until the user opens the
// rules for the first time, so it's discoverable during the first session.
const fab = document.createElement('button');
fab.className = 'rules-fab'; fab.title = 'Rules'; fab.textContent = '?';
if (localStorage.getItem('rules_seen') !== '1') fab.classList.add('pulse');
fab.onclick = () => {
  fab.classList.remove('pulse');
  localStorage.setItem('rules_seen', '1');
  showRules();
};
document.body.appendChild(fab);

// Inject the settings gear FAB (sits to the left of the rules FAB)
const gearFab = document.createElement('button');
gearFab.className = 'settings-fab'; gearFab.title = 'Settings'; gearFab.textContent = '⚙';
gearFab.onclick = showSettings;
document.body.appendChild(gearFab);
</script>
</body>
</html>
