<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourneyPal - Design Concept Presentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        volt: '#D4FF00',
                        voltHover: '#BCE600',
                        cyanAccent: '#00E5FF',
                        darkBg: '#0B0E14',
                        cardBg: '#151A23',
                        borderDark: '#222A38',
                        textMuted: '#94A3B8',
                        success: '#10B981',
                        warning: '#F59E0B',
                        error: '#EF4444',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050608; color: #F8FAFC; }
        .glass-panel { background: rgba(21, 26, 35, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid #222A38; }
        .device-frame-desktop { width: 100%; max-width: 1024px; aspect-ratio: 16/10; border-radius: 12px; overflow: hidden; border: 4px solid #334155; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: all 0.3s ease; margin: 0 auto; }
        .device-frame-mobile { width: 375px; height: 812px; border-radius: 40px; overflow: hidden; border: 12px solid #1e293b; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); transition: all 0.3s ease; margin: 0 auto; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(212, 255, 0, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(212, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 255, 0, 0); }
        }
    </style>
</head>
<body class="antialiased selection:bg-volt selection:text-darkBg">
    <main class="pt-24 pb-32">
        <header class="max-w-7xl mx-auto px-6 py-16 text-center">
            <h1 class="text-5xl md:text-7xl font-display font-bold tracking-tighter mb-6">
                Tourney<span class="text-transparent bg-clip-text bg-gradient-to-r from-volt to-cyanAccent">Pal</span>
            </h1>
            <p class="text-xl text-textMuted max-w-2xl mx-auto font-light">
                Design concept presentation.
            </p>
        </header>
        <section class="max-w-5xl mx-auto px-6 py-16 border border-borderDark rounded-2xl bg-cardBg/60">
            <p class="text-textMuted mb-4">
                This file stores your provided TourneyPal design concept HTML in the project as a static artifact.
            </p>
            <p class="text-sm text-gray-300">
                Open this page directly at <strong>/tourneypal-design-concept.html</strong>. If you want, I can next convert this static mockup into reusable React components in `src/`.
            </p>
        </section>
    </main>
</body>
</html>
